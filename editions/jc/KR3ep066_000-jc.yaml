body:
  text: 附方一眼癬方癢甚如有蟲上下眼皮紅用野薔薇花根打汁搽擦即愈並治頭面上及唇口有瘡癢甚出黃水亦可調捺立愈又方用蜈蚣一條浸麻油內七日取起在火上燒滴下之油盛器內放地出去火氣調搽亦愈二洋菸斷癮方四物飲生甘草一斤川貝母一兩去心研細老生薑四兩赤砂糖一斤先將上三味煎熬二三次去渣後以砂糖同藥收膏再以好洋菸五錢調人收貯如一錢癮者食藥五錢逐日減少並以砂糖沖水代茶即斷如癮極重者取已煎之汁十杯再煎至一杯再服必效有人二十餘年之癮照此戒斷切勿輕視又方用生甘草一味煎膏調人煙中吸食二三日即漸不欲吸此方最易不傷人並無煙痢之疾癮深者照法治之一月即斷又方每日用鱔魚一二條滴血沖酒輕者吃四五十條重者百餘條飲此酒大補氣血依此飲之不斷自斷見煙自遠三乳岩秘驗方活蟹十四隻浸尿坑內半月許待肉去盡聽殼再清水內漂淨取起風乾瓦上炙灰存性牡蠣四兩煅灰二味共研細末收好每服三錢陳黃酒隨量送下堅塊自消

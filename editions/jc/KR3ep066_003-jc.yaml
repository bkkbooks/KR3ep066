body:
  text: 卷下一鼓脹案腫脹及腹脈微而遲溺黃舌膩此中虛失運濕熱內蘊有單脹之憂綿茵陳延胡金鈴子青皮炒枳實生牡蠣茅朮黑梔神麯制香附雞內金澤瀉另服小溫中丸案脾泄經年納穀則痛脹脈軟無神氣虛失健運防成中滿難調冬白朮木香熟半夏炮姜雲茯苓西黨參炙甘草雞內金砂仁陳皮案素患脘痛而嘔自夏及冬更兼濡泄脈細數無神形肉日脫此係木邪侮土脾胃受傷防成中滿難調冬白朮杜仲西黨參炮姜炙甘草制川附雞內金菟絲子白芍茯苓另服腎氣丸案脈細數舌淡而光形瘦腹滿胃納甚少中州衰敗證屬難調勉擬溫補中參以通絡法制川附茯苓冬白朮白芍西黨參旋覆花新絳案風濕相搏腫脹甚於下大便泄小便澀脈來遲細暫以分消官桂木豬苓炒茅朮澤瀉赤苓大腹皮廣皮桑皮苓皮防己萆薢秦艽案瀉後足脛腫食減力乏脾胃兩虛也北沙參赤苓冬白朮炙甘草廣皮製半夏苡仁砂仁殼木瓜案夏季赤白濁淋繼以便泄腹痛已經三月矣現診脈微數根神已失面黃足腫飲食漸減始由濕熱下注今則脾腎陽衰將有中滿之憂症難調治制川附八分冬朮二錢菟絲子三錢赤苓三錢生杜仲三錢益智仁一錢澤瀉一錢半川萆薢二錢苡仁三錢案脈大溺赤舌白膩眼白微黃不時寒熱心下痞納食則欲嘔此濕熱內阻氣化失司防成黃疸難治淡豆豉山梔綿茵陳桂枝佩蘭炒茅朮澤瀉白豬苓另服左金丸赤苓案脈左弦右細面白無華當胸痛脹上撐兩脅飲食漸減此脾氣傷殘濁陰上僭也年周花甲防成中滿難調甜桂心茯苓冬白朮炙甘草雞內金白芍青皮案脈微咳嗽喘脹交加將有中滿之憂暫用輕清以開上焦大杏仁蘇子冬瓜子紫菀旋覆花大腹皮苡仁兜鈴桃仁白萊菔煎湯代水案寒熱傷於肺咳嗽脈細腫脹自上及下症起於暴擬開太陽法大杏仁麻黃萊菔子蘇子葶藶子大腹皮廣皮茯苓皮苡仁水姜皮案病後咳嗽未除肢體更加腫脹此脾肺腎三臟失司之大病症屬難調冬白朮茯苓炙甘草桂木生牡蠣杜蘇子澤瀉炒苡仁椒目復診咳嗽腫脹已除惟左足微腫脈虛數不調此脾腎虛寒也制川附一錢牛膝一錢半菟絲子三錢杜仲三錢川萆薢二錢冬朮二錢茯苓三錢木瓜炭一錢半苡仁四錢案腹脹如鼓脈微便泄暫擬開太陽法冬白朮二錢豬苓一錢半赤苓三錢澤瀉一錢半甜桂心四分制川附椒目三分大腹皮二錢案腹脹已極分利不應脈來虛細濕熱內蘊中焦陰虛不堪攻伐轉擬養陰通腑法白豬苓茯苓清阿膠澤瀉金鈴子延胡滑石米鉤通關丸先服濟生腎氣丸後服案脈沉細面目浮腫延及於腹惡寒力乏此寒濕相搏衛陽失運也嫩桂枝杏仁大腹皮廣皮茯苓皮桑皮椒目獨活秦艽豆卷懷牛膝姜皮案風傷於上脈浮大舌絳無胎頭面浮腫延及於腹症非易愈西羌活秦艽漢防己防風大腹皮桑白皮赤苓砂仁殼木香案肝積在左脅脾虛不能運化腹脹足脛亦腫或痛或泄症非易治雞內金白芍冬白朮枳實茯苓青皮砂仁菟絲子杜仲生牡蠣案脈沉遲舌淡光滑浮腫自足及腹大便溏脾腎陰陽兩虛矣擬真武法制川附一錢茯苓三錢冬朮一錢半白芍二錢生杜仲三錢菟絲子三錢木瓜一錢雞內金三錢姜渣一錢另服濟生腎氣丸案瘧痢之後足脛浮腫脈微食減脾胃之陽式微也制川附一錢冬朮二錢菟絲子三錢杜仲三錢茯苓三錢雞內金三錢木瓜一錢製半夏一錢半砂仁殼一錢薑棗案腫脹自下及腹小便卻利此膚脹也杏仁三錢麻黃五分大腹絨三錢苡仁四錢茯苓皮三錢桑白皮一錢半陳皮一錢半杜蘇子三錢案濕熱內蘊外觸風邪腫脹從下走腹小便短澀而赤脈數氣逆法宜表裡分消桑白皮茯苓皮地骨皮秦艽大腹皮大杏仁防風小川樸另服小溫中丸案久患中滿今春又加嘔逆脈遲舌白此肝邪乘胃也擬仲景法製半夏茯苓吳茱萸陳皮炙甘草旋覆花黨參代赭石生薑案腫脹經年自下及上脈遲細平昔好飲此脾腎陽虛濕邪氾濫也擬開腑補臟參用嫩桂枝白朮白豬苓澤瀉赤茯苓大腹皮桑皮車前子牛膝另服濟生腎氣丸案面浮曰風足腫曰水風水相搏一身患腫兼以氣急難臥小溲短澀最恐喘甚而敗五加皮茯苓廣皮姜皮白芥子萊菔子蘇子桑白皮大杏仁旋覆花冬瓜子小樸案年老中虛足腫食減制川附木瓜川牛膝苡仁川萆薢生牡蠣赤苓杭菊花案濕熱內蘊囊腫及腹有單脹之勢金鈴子延胡小青皮滑石大腹皮尖檳榔苦參焦神麯案單腹脹大脈反浮大且數大便不實小便色赤病因左脅癖散成鼓溫補不宜早投症屬難調旋覆花新絳生牡蠣青皮雞內金海南子赤苓金鈴子案濕熱內蘊單腹脹大如鼓脈數舌黃燥而裂症非易治雞內金赤苓炒茅朮澤瀉大腹皮制香附針砂焦神麯小樸生牡蠣案木邪乘土大有單腹脹滿之形旋覆花新絳金鈴子延胡雞內金生牡蠣茯苓小青皮蔥管案濕熱壅腫單腹大如鼓舌胎黃脈弦大暫以分消炒茅朮滑石白豬苓澤瀉赤苓小川樸針砂黑山梔腹皮制香附案左濕熱內蘊腹脹如鼓左脈弦數小便色赤面黃形瘦有土敗木賊之候金鈴子延胡大腹皮針砂炒茅朮黃柏炭桂心制香附赤苓綿茵陳案右七旬高年胃弱肝強左脅癖脹痛食減吐逆脈弦硬形瘦便泄慮其單脹金鈴子延胡製半夏茯苓小青皮雞內金白芍炒枳實加左金丸第二案嘔逆雖止痛泄不已脈沉伏寒熱尚重舌黃枯燥渴飲頻多津液元氣被劫最慮風動厥逆之變小川連吳萸炙甘草白芍法半夏炒枳實木瓜白扁豆赤苓青蒿苦桔梗鉤鉤案病後癖散成鼓脈弦數土敗木賊難治生牡蠣五錢冬朮二錢雞內金三錢青皮一錢小川樸五分旋覆花一錢半新絳一錢案腫脹自下及腹已成水鼓傷於濕者下先受之症屬難調甜桂心冬朮大腹皮豬苓福澤瀉桑白皮廣皮川萆薢杏仁大豆卷五加皮苓皮案左下水著寒濕之氣皮毛閉郁遂致寒熱脈細肢腫症屬纏綿難愈大杏仁香薷飛滑石秦艽大豆卷法半夏赤苓防己米仁案脾腎陽虛濕泛將有中滿之憂制川附一錢炒白朮二錢淡乾薑五分西黨參三錢茯苓三錢炙甘草五分案風濕外侵防其腫脹大豆卷秦艽青防風藿香法半夏真茅朮杏仁赤苓腹皮加生薑復診腫脹稍減舌見黃燥瀉不止微有寒熱此濕未去已生熱溫燥之劑不宜投矣症頗險重飛滑石赤苓福澤瀉豬苓陳阿膠粗桂枝杏仁小川樸另服小溫中丸案癖散成鼓難調之恙脈弦細而鬱木邪剋土氣血兩傷暫以疏泄絡痹旋覆花歸鬚生牡蠣青皮雞內金尖檳榔延胡金鈴子赤芍炒枳實金香附柴胡案脈細如絲四肢浮腫大便溏泄小溲渾濁如米泔產後起因半載不健變端疊出實難調之恙速宜斷乳為要川萆薢赤苓澤瀉豬苓冬朮益智仁牡蠣軟白薇狗脊甘草梢淡竹葉木瓜案嘔血之後氣失依歸以致周身浮腫脈微便溏擬理陰煎意症屬難調西黨參炮姜制川附茯苓冬朮炒熟地炙草歸身炭二噎膈案左脈浮弦右細納食則噎膈痛脹年逾花甲精液枯槁兼之肝木乘胃極宜內觀靜養屏除家務為要擬丹溪法西黨參一錢半白蜜一錢雞距子二錢牛乳一杯法半夏一錢半香梨汁一杯藕汁一杯生薑汁韭菜汁用根白搗一杯案肝鬱傷陰延及於胃脈郁數帶弦舌胎據述常黃年逾五旬防成噎膈難調竹瀝炒半夏新會皮牡蠣赤苓北沙參旋覆花麥冬肉橘葉新絳青蔥管案納穀痛脹已經半載矣脈弦搏舌胎黃噫氣不除時吐酸水年老中虛肝木從而肆逆土敗木賊將成噎膈難治旋覆花茯苓代赭石炙草製半夏北沙參麥冬肉廣皮枳實竹茹案憂愁思慮氣結不舒納穀則欲噎大便燥結口中微有涎沫防成噎膈難治熟半夏茯苓廣皮薤白大杏仁北沙參麥冬瓜蔞皮檀香案老年噎膈痰多脈虛弦中氣無權肝乘土位暫擬喻氏意用仲景鎮逆法西黨參茯苓法半夏炙草新會白旋覆花藕汁代赭石薑汁案六旬之歲春間驟起噎膈口吐白沫脈弦大而數瘦人多火肝強胃弱極宜內觀靜養為要熟半夏茯苓石決明麥冬新會皮西洋參竹茹加地慄案脈細而遲嘔逆不能納穀食則少時吐出大便或泄腹中雷鳴切痛此係脾胃虛寒殊非易治制川附茯苓熟半夏炙草冬朮炮薑炭黨參橘白案脘痛脈微朝食暮吐此係火不生土命門無蒸變之力症難調治西黨參茯苓法半夏炙草白蔻仁公丁香生薑吳萸另服金匱八味丸三痰案痰生於頸左兼有寒熱症起於暴暫用清疏夏枯草天蟲淨連翹橘葉象貝大杏仁防風苦桔梗前胡花粉鉤鉤案痰癧生於兩頸脈細數咳嗽兼有寒熱肝腎陰虧漸傳於肺藥難取效大貝牡蠣夏枯草甘菊粉丹皮元參心連翹花粉橘葉案虛痰入絡右手不能舉藥難見效法半夏茯苓夏枯草乳香片薑黃蒺藜天蟲石決明枳殼風化硝炙甘草橘紅加薑汁竹瀝案體肥多濕濕生痰痰生熱熱則生風以致痛痹半年足痛之後近又移於腰脊背部高脹一塊如拳大按之反不痛所謂先痛而後腫者氣傷形也此必流痰注於太陽大抵怪症多屬於痰庶或近是然非決而逐之必難獲效法半夏赤苓橘紅枳實川萆薢白芥子天蟲防己獨活炒苡仁白蒺藜竹瀝薑汁另服指迷茯苓丸後服控涎丹案懷抱抑鬱氣滯痰凝以致神呆健忘病涉心包難許見效擬大七氣湯以治其標白金丸以治其本老蘇梗小樸法半夏茯苓石菖蒲甜桂心遠志鉤鉤另服白金丸案痰風鼓動脈象洪數面色紫黑咳逆氣促經脈不時動惕肺肝之病居多必期脈息和平方有好音西羚尖茯苓石決明枳實白蒺藜陳阿膠兜鈴竹瀝炒半夏鉤鉤牛蒡子飛青黛加竹瀝竹茹薑汁四痹痛案風濕熱三氣雜至發為行痹四肢不時痠痛脈弦大有力舌根心獨光理宜節飲白蒺藜甘菊穭豆皮牛膝茅木炭黃柏炭狗脊歸鬚赤芍苡仁川萆薢生地薑汁浸炒另服豨薟丸案風濕熱三氣雜合而為痹面部赤腫痹痛舌黃溺赤法宜分消白蒺藜甘菊真茅朮黃柏牛蒡子金銀藤萆薢連翹心元參黑梔茺蔚子案高年氣血兩虛風濕熱合而為痹周身關節痠疼一時難以見效漢獨活防風白蒺藜當歸川牛膝川萆薢川芎苡仁木瓜狗脊干桑枝另服豨薟丸案風寒濕襲入肢節足臂痛此痹症也白蒺藜川芎片薑黃當歸川萆薢炒苡仁防風西羌活桂枝川牛膝炙乳沒桑枝複方大熟地當歸東白芍川芎綿黃耆青防風木瓜炒苡仁杜仲川牛膝金狗脊蒺藜干桑枝案始因寒熱左腿紅腫且痛繼發白疹至今腫退熱止筋脈猶牽掣不舒脈細數無力當從血虛風痹為治全當歸牛膝川萆薢木瓜炙首烏白蒺藜米仁炙乳沒杜仲干桑枝復診痹痛已去近來小有寒熱脈轉微數舌胎淡白兼黃濕邪未盡又著微寒邪少虛多之象法以溫通和解粗桂枝白芍制川附米仁炙甘草白蒺藜杜仲菟絲餅木瓜川萆薢加薑棗案周身不時痠痛膚髮紫斑嘔血乃退如是者兩三次矣脈澀數天癸仍通宗繆仲醇治血義荊芥炭紫菀冬桑葉茜草青防風全當歸赤芍粉丹皮白薇冬瓜子茺蔚子案稟質素弱衝任不調筋骨失所涵養足冷且痛腰脊痠軟一時難復大熟地歸身厚杜仲狗脊菟絲子制川附米仁炒木瓜案老年血衰風動脈弦數足膝時痛擬丹溪法制首烏木瓜穭豆衣牛膝白蒺藜酒當歸米仁金狗脊案脊骨下椎板痛脈來虛弱肝腎陰虧腎經病也大熟地杜仲菟絲子柏子霜鹿角膠茯苓補骨脂案脈細腰脊時痛此命門火衰也大熟地歸身懷山藥山萸肉菟絲子鹿角膠杜仲補骨脂胡桃川附子案缺盆中痛脈弦數肺肝兩絡之病全瓜蔞薤白旋覆花新絳金鈴子延胡枳實青蔥管案頭面腫四肢關節俱痛此風濕相搏也西羌活獨活白蒺藜米仁大豆卷防己防風川牛膝蔥白寒濕腳氣方真茅朮黃柏川
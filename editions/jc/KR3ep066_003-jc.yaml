經三月猝然行動如崩兼之帶下綿綿頭眩微痛旋覆花新絳海螵蛸茜根杭菊東白芍白薇荊芥蔥管案年已十七天癸未至脈象數大有餘不時面赤烘熱近來吐血數口恐有倒經之累烏賊骨茜草製大黃韭汁拌炒桃仁泥軟白薇卷柏牛膝澤蘭白花茺蔚案天癸當止之年反覺亂而多下兼之肢麻門帶左耳刺痛脈兩弦無非血虛風動之故軟白薇桑葉粉丹皮杭菊海螵蛸穭豆衣阿膠旋覆花新絳案素有痰癧之恙更兼倒經寒熱遍體時現紫斑病屬難調烏鰂骨茜草軟白薇丹參茺蔚子粉丹皮桃仁山楂炭澤蘭川牛膝降真香荊芥案經水淋漓腹痛衝任不調故也法宜和補宣通旋覆花新絳軟白薇楂炭鬱金茺蔚子丹參金香附荊芥當歸案血枯經止喜其脈來和緩又無寒熱咳嗽等症可保無虞海螵蛸茜草茺蔚子當歸大熟地甜桂心澤蘭制香附用益母膏搗丸案脈細數經期錯亂不時寒熱腹痛氣血兩虛衝任不調故也烏鰂骨茜草旋覆花新絳大熟地杭菊花當歸穭豆衣案經停一載脈來弦大肌肉就削微兼咳嗽有風消之象宜氣血兩通法烏鰂骨茜草全當歸蘇子懷牛膝金香附澤蘭桃仁泥楂炭案脈細數形瘦經停半載腹痛不休此血枯經閉也海螵蛸茜草旋覆花新絳大熟地甜桂心當歸軟白薇牛膝青蔥管案先腫脹而後經水斷脈弦舌無胎豈是濕邪泛溢之病姑擬氣血兩通法懷牛膝當歸嫩桂枝赤苓炒赤芍白豬苓澤瀉烏鰂骨茜草金香附案經閉兩年漸加咳嗽時有寒熱脈細數形瘦二陽之病延及心脾前用內經血枯經閉法未得應手症難圖治大熟地牛膝全當歸紫菀軟白薇茺蔚子丹參柏子仁卷柏清阿膠枸杞子案經行先期而至色黑腹痛脹海螵蛸茜草茺蔚子全當歸楂炭炒延胡川芎大腹皮澤蘭金香附上以鮑魚湯泛丸案經停兩月食谷欲嘔此惡阻也法半夏茯苓心會白炙甘草老蘇梗北沙參麥冬白蒺藜竹茹案營陰不足經斷逾載絡失所養左肩胯結核累累而為流痰虛損之象宜平肝養血佐以化痰制首烏白芍刺蒺藜歸身雲茯苓粉丹皮柴胡心會皮大生地砂仁拌炒生牡蠣十一崩漏案崩漏時發面黃浮腫兼之脘痞脹滿脈虛舌白血去過多氣亦窒痹而不行難治旋覆花新絳金香附炮姜九香蟲菊花炭白薇海螵蛸茜草青蔥管案崩漏月餘不止近加寒熱如瘧脈弦數舌胎滑膩伏邪發動症非易治荊芥炭白薇大豆卷防風青蒿旋覆花新絳炒黃芩青蔥案崩後脈數大血虛風動之象女貞子丹皮旱蓮草牡蠣軟白薇細生地當歸穭豆衣首烏案久崩餘瀝不清宜丸藥緩圖大熟地八兩歸身東白芍三兩黃耆酒炒三兩冬白朮清阿膠炮姜炙甘草蘄艾厚杜仲川續斷加醋炒椿根皮用蜜為丸案天癸當止之年崩漏淋漓不斷脈數無神寒熱咳嗽損傷已甚調治殊難軟白薇紫菀粉丹皮桑葉苡仁烏鰂骨茜草粗桂枝白芍炙草復診去桂枝加玉竹附記陰毛生八角蝨用白眼果嚼融擦之神效或用桃仁嚼爛擦之亦可十二帶案四十體肥帶下頭面四肢浮腫多年之恙自宜緩調從脾虛濕濁下注治冬白朮三兩米仁三兩川黃柏一兩牡蠣三兩厚杜仲三兩川萆薢一兩炮姜五錢金狗脊三兩木瓜一兩雲茯苓一兩椿根皮一兩另服威喜丸案年老血虛形瘦帶下宜從奇經調治大熟地八兩杜仲鹽水炒三兩煅牡蠣三兩歸身酒炒三兩菟絲子三兩雲茯苓狗脊三兩枸杞三兩湖蓮肉三兩線魚膠蛤粉炒桂圓肉煎汁衝入四兩量加白蜜為丸沙苑子雞子黃拌蒸四兩茯苓三兩案帶下赤白脈弦數腹皮熱高年形瘦肝與任脈為病殊難調治烏鰂骨茜草金鈴子延胡車前子赤苓丹皮案高年氣液兩虛帶下綿綿不止脈微形瘦調補殊難幸勿期速效古臺參狗脊雲茯苓續斷沙蒺藜金櫻子蓮心蓮蕊須芡實金石斛穭豆衣首烏案脈細數兼弦形瘦帶崩病經半載不痊近來大便艱澀總之精液內耗風陽閃鑠病在奇經不和之故古人云久崩久帶宜通宜清擬方候正漂蓯蓉二錢白薇一錢半黑芝麻三錢玉竹三錢柏子霜三錢生首烏當歸四錢穭豆衣三錢杭菊二錢福白蜜調入一錢案張帶下腰痛奇經八脈不固桑螵蛸杜仲菟絲子茯苓炙鱉甲軟白薇牡蠣金狗脊加胡桃肉二枚十三懷娠案懷娠五月陡然腹脹大便溏薄脈弦細症非易治擬紫蘇飲意大腹皮桑皮生杜仲蘇梗冬白朮青木香砂仁全當歸案懷娠八月寒熱如瘧近日但熱無寒前曾得汗下瀉幾回脈數大舌燥胎黃兼之咳嗆口渴當此秋燥之令理宜和解清邪以寓保胎之意為穩鮮沙參知母香青蒿黃芩白薇煨葛根炙甘草天花粉白芍肥玉竹冬桑葉竹葉枇杷葉案懷娠臨月咳嗽音嗄脈右多弦大難治之恙牛蒡子兜鈴炙甘草桔梗大杏仁肥知母黃芩元參心糯米案二十歲重身伏邪雖轉瘧脈至如潮湧胎氣必不能安兼之咳嗽口渴上逼之機已顯然矣慎之青木香黃芩煨石膏知母炙甘草冬桑葉杏仁旋覆花白薇地骨皮香青蒿竹茹蘆根案經停四月有懷妊之象現在寒熱如瘧舌胎黃膩脈左多弦數兀兀欲嘔脘痛腹膨按軟時時氣逆上撐是系伏邪夾氣鬱為患症屬糾纏老蘇梗杏仁大腹皮赤苓旋覆花法半夏小樸淡黃芩米鉤桑皮加竹茹十四產後案產後瘀不行身熱泄瀉已經一候脈數舌紅爍四肢腫痛色赤此係敗血留經兼挾伏邪風火扭結為害甚屬棘手勉方荊芥炭防風漢獨活白薇大豆卷炒赤芍澤蘭山楂炭川芎炒銀花炙乳沒歸鬚炒苡仁加荷葉筋復診產後瘀留身熱氣促舌光手足紅腫不得屈伸將有鬱冒痙厥之險速候高明再議五靈脂蒲黃白蒺藜桃仁炒赤芍炒銀花丹皮犀角尖澤蘭廣鬱金案產後即起寒熱脈搏數咳嗽膚腫惡露早停病機甚為不善嫩桂枝小樸大杏仁蘇梗山楂炭澤蘭炒荊芥桃仁泥白薇炒苡仁案產後未曾滿月寒熱纏綿不已素有喘嗽之恙近又增劇症屬棘手桂枝赤芍炙甘草白薇炒苡仁旋覆花桑葉全當歸生薑案產後血氣未復肝脾不和將值夏令極宜靜養雞內金牡蠣軟白薇杜仲金狗脊冬白朮苡仁木瓜炭杭菊穭豆衣案產後十朝惡露雖行寒熱起氣促須防鬱冒神蒙之變香青蒿白薇大豆卷苡仁炒荊芥冬瓜子紫菀白蒺藜西瓜翠衣案產後起嘔嘔止乃喘是沖肺之危候旋覆花杏仁杜蘇子蘇木懷牛膝全當歸沉香紫石英案產後敗血衝心癲狂痙厥症屬甚險勉方以冀萬一荊芥炭丹參五靈脂蒲黃老鬱金茺蔚子琥珀細藥珠赤金辰砂拌燈心案產後十朝嘔噦呃忒脈虛汗泄神呆囈語此沖胃衝心之險症立夏將交防其厥脫臺參鬚左牡蠣朱茯神龍骨熟地炭甜桂心炙甘草紫石英淮麥紅棗子復診昨進救逆鎮陰法神氣站定嘔噦與頭痛少緩再以前方增減臺參鬚牡蠣龍骨白芍熟地炭制川附沉香柏子仁茯神復診西黨參熟地清阿膠牡蠣晉龍骨柏子仁棗仁朱茯神又神魂不安虛陽飛越鎮攝凝鍊一定之法生牡蠣龍齒大熟地丹參懷牛膝柏子仁淮麥炙甘草紅棗五味子辰砂拌茯神案產後腹中絞痛大便泄小便少惡露尚有流行症屬棘手勉擬金匱法當歸小茴香炒一錢煨生薑一錢鮮羊肉一兩桂心五分雲茯苓三錢復診交肉桂茯苓山楂炭炙甘草煨生薑茺蔚子白芍全當歸小茴香拌炒案產後氣血兩虛頭痛鬱冒惡露未清補劑且緩茺蔚子白薇全當歸牡蠣炒苡仁荊芥炭澤蘭嫩桂枝丹參東白芍炙甘草黃耆酒炒案產後形寒咳嗽脈微少腹痛小便頻數病在奇經八脈有蓐勞之候鹿角霜桂枝金狗脊苡仁菟絲子厚杜仲白薇旋覆花新絳全當歸小茴香炒案產後滿月先瀉傳痢所下皆白積臍之左瘕聚攻衝作痛痛止即無形脈軟弱舌尖光色白汗泄氣血兩虧虛多邪少慮其纏綿致困炒白芍焦甘草冬白朮炮薑炭小青皮青木香雲茯苓山楂炭荷蒂案產後寒熱如瘧舌白脈數促未得汗伏邪未徹也營虛之體百脈空乏調之非易嫩桂枝當歸白芍炙草小樸尖檳榔白薇案產後小便不禁任脈失司難調之恙菟絲子三錢杜仲三錢韭菜子白芨一錢半沙蒺藜三錢粉丹皮一錢茯苓三錢益智仁五分加黃絲絹一塊另服威喜丸案產後將及一年寒熱纏綿不已形瘦腹痛此屬陽維為病近加咳嗽更不宜也擬仲景當歸建中湯意嫩桂枝當歸白芍炙甘草軟白薇肥玉竹阿膠軟紫菀加薑棗飴糖復診產後寒熱將及一年脈細數腹痛則大便下下後痛即止前進當歸建中湯寒熱輕咳嗆減而腹痛依然此虛中有滯也轉擬桂枝湯加減以和營衛旋覆花以通絡倘再糾纏不了必成蓐損嫩桂枝白芍炙甘草新絳旋覆花霜桑葉白薇當歸鬚紫菀粉丹皮茺蔚子青蔥案產後寒熱咳嗽嘔血頻仍形瘦氣促有蓐勞之象軟白薇當歸陳阿膠紫菀霜桑葉紫石英麥冬熟地炭牛膝加紅棗十大功勞案胎前足腫產後兩日四肢悉腫咳嗽氣升惡露流通小便亦利並無關於氣血蘊滯也宜溫通開肺法旋覆花杏仁甜桂心米仁赤苓懷牛膝椒目茺蔚子澤蘭青木香加桑枝案胎前浮腫產後月餘不退腹與兩脛尤甚脈沉細脾腎兩虛調之非易冬白朮甜桂心茯苓炙草厚杜仲川牛膝木瓜萆薢另服濟生腎氣丸案胎前咳嗽產後不已脈細數而澀時有寒熱聲音漸啞有蓐勞之象嫩桂枝當歸紫菀茸蘇子冬桑葉苡米仁炙草軟白薇玉竹陳阿膠馬兜鈴案胎前浮腫產後足脛不消胃脘時痛脾胃氣虛肝邪橫肆也冬白朮赤苓佩蘭米仁川牛膝木瓜炭楂炭萆薢茺蔚子炒枳實廣鬱金案時邪熱迫半產脈數大舌黃便泄極為棘手難防鬱冒痙厥之險飛滑石白薇銀花炭赤苓大豆卷佩蘭楂炭炒荊芥益母草煎湯代水案小產後少腹痛脹脈沉舌白瘀惡未淨故也炒桃仁歸鬚茺蔚子澤蘭楂炭鬱金丹參炒延胡炮姜案半產後起咳嗽已經三月矣近加寒熱如瘧脈浮數腠理空疏外邪易襲汗泄惡風擬仲景營衛不和例治之症難脫體矣嫩桂枝白芍炙甘草白薇霜桑葉肥玉竹米仁旋覆花加薑棗又咳嗽起於半產後寒熱如瘧前進和營衛法寒熱已嗽仍不止汗泄惡寒衛外之陽不固再擬仲景法加減嫩桂枝白芍制川附牡蠣炙草大有耆白薇浮小麥玉竹紅棗案呂小產後尿脬下墜經水淋漓腰脊骨痛衝任二脈不固難調之恙粉丹皮新絳川續斷白薇元武板鹿角霜當歸雲茯苓復診丸方大熟地鹿角霜補骨脂菟絲子厚杜仲雲茯苓元武板枸杞子鹿角膠柏子霜白芨案錢胎前咳嗽腫脹半產之後惡露不行更加寒熱神蒙脈芤數鼻煤氣粗有敗血衝心之候症屬至險澤蘭二錢桂心五分桃仁泥三錢五靈脂三錢丹參一錢半生蒲黃一錢半鬱金一錢半大腹皮三錢炙桑皮一錢半茯苓三錢軟白薇一錢半楂炭三錢案三十歲產後暑濕之邪溜於絡以致肢節腫痛脈弦數寒熱幸而惡露流通症屬糾纏可慮炒豆卷澤蘭荊芥炭楂炭片薑黃刺蒺藜米仁炒赤芍防風炙乳沒青木香赤苓加桑枝案伏邪寒熱傷胎產後身痛不能移動兩足日腫手麻不舉舌胎黃膩寒熱依然近加咳嗽此屬濕邪流入關節但百脈空疏消補兩難慮蔓延遍體腫脹則不治矣白杏仁米仁炙桑皮秦艽川萆薢片薑黃赤苓青木香木瓜粗桂枝生牡蠣澤瀉加桑枝案經年寒熱產後匝月不已形瘦食減腹痛脈虛數若加咳嗽便成蓐勞粗桂枝白芍炙甘草白薇茺蔚子肥玉竹當歸穭豆衣加薑棗飴糖

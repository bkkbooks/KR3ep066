body:
  text: 卷上一春溫案溫邪斑汗兩得身熱不退脈數不靜舌紅燥無津陽明氣分之火漸入營分最怕昏狂滋變犀角尖元參鮮生地石膏肥知母炙甘草鬱金淨連翹茅蘆根煎湯代水案溫邪得汗舌黃脈促數咳嗽夜來但熱無寒擬金匱溫瘧例治之嫩桂枝黃芩炙甘草赤芍肥知母煨石膏白薇大杏仁案交春八日猝然吐血數口旋即寒熱必有溫邪內蘊刻診脈象弦數夜來身體微熱宿恙依然陽絡受傷可知宜清邪兩和法軟白薇丹皮冬桑葉茜草紫菀茸桃仁泥紅花絲瓜子苡仁白花益母草案咳嗽寒熱雖減舌乾燥無津肺胃溫邪究未盡徹淡豆豉黑山梔大杏仁黃芩淨連翹香清蒿軟白薇粉丹皮竹葉案溫邪表裡分侵寒熱泄痢十餘日不解非小恙也葛根炒銀花柴胡生甘草枳實赤芍淡豆豉鬱金制香附案溫邪咳血音嗄冬瓜子苡仁桃仁泥茜草紫菀茸犀角尖白薇人中白案溫邪發斑脈促數而歇止身無大熱息浮如喘舌乾燥而黃神蒙譫語此液枯邪陷少陰之水不濟陽明之火有餘陽症陰脈實屬難治犀角尖熟地煨石膏當歸麥冬肉炙甘草元參軟白薇案溫邪直入心包昏狂口噤昨進芳香宣竅其勢少平猶見譫語遺尿右脈數大身熱有汗舌短縮陽明氣火有餘膻中尚未解圍症屬棘手炒茅朮煨石膏知母生甘草羚羊尖石決明黑山梔豆豉另服萬氏牛黃丸案溫邪身熱無汗斑疹隱約咳嗽神蒙體重難於轉側左脈細數無神力舌胎白膩將有逆傳心包之變症屬極險軟白薇玉竹淨連翹黃芩天花粉黑山梔鉤鉤大豆卷鬱金石菖蒲生甘草百部加蘆根案溫邪寒熱往來咳嗽嘔逆脈兀數舌黃得汗不解症屬糾纏細柴胡黃芩熟半夏茯苓炙甘草旋覆花枳實大杏仁廣皮桑白皮石菖蒲白薇加竹茹案溫邪汗出不解舌尖紅燥胎黃神蒙遺尿邪逼營分有發狂痙厥之變軟白薇連翹生山梔黃芩淡豆豉生甘草木通細生地鬱金嫩竹葉案素患老嗽今感溫邪發熱一候不解脈數少力舌光無胎鼻孔焦乾喉間痰阻有聲總屬上焦肺病形瘦陰虛之體恐難勝此軟白薇元參冬桑葉兜鈴大杏仁牛蒡子黃芩地骨皮花粉鉤鉤炒枳實蘆根案溫邪劫陰脈細數無力舌焦乾氣促咳嗽身熱無汗不可攻表以求其汗症屬險重羚羊尖白薇鮮沙參元參肥玉竹天花粉生草香青蒿黃芩茅蘆根案冬傷於寒春必病溫此症恰值交春而發脈數弦急舌紅燥無胎咳嗽身熱上嘔下利邪勢充斥防其傳變葛根大豆卷桔梗軟白薇大杏仁赤芍元參心獨活酒黃芩生甘草麻黃陳細茶姜皮復診嘔止瀉緩汗未沾足舌紅燥咳嗽氣息身熱伏溫之病勢在方張葛根大豆卷紫菀軟白薇甘草赤芍元參心銀花丹皮肥玉竹連翹茅蘆根復診溫邪初起即漏底勢先內趨今利雖止舌猶紅燥咳嗽痰鳴得汗熱不退幸勿昏喘為妙羚羊尖元參軟白薇貝母大杏仁地骨皮甘草冬桑葉兜鈴炒牛蒡天花粉鉤鉤案昏狂已退猶見目赤面紅如醉人狀舌紋裂無胎脈細數咳逆溫邪與木火尚作升厥之勢羚羊尖元參軟白薇鉤鉤人中白連翹鱉甲丹皮茅根復診咳逆少平舌亦紅潤可無陽升喘急之慮矣再以兩清肺肝參入存陰之品羚羊尖鉤鉤冬桑葉元參粉丹皮人中白甘草大貝知母軟白薇花粉茅蘆根案伏溫入營斑點隱約目赤神蒙如狂欲起脈弦少數舌焦黑邪已深入厥陰驚蟄將交怕有痙厥之險變生鱉甲元參連翹鬱金軟白薇黑山梔粉丹皮豆卷木通生地甘草梢茅根案伏溫初起自利邪即內傳今利雖止猶見舌強幹涸右脈數而少力身重不得轉側液枯邪陷症屬極險生鱉甲元參軟白薇連翹香青蒿天花粉黃芩生甘草鉤鉤粉丹皮茅蘆根復診液回邪化症有轉機擬清肺絡之痰熱羚羊尖青黛軟白薇鱉甲粉丹皮天花粉蛤殼桑葉元參茆根肉復診復病寒熱身重左脈弦數舌乾涸無胎咳痰艱澀液枯邪未盡殊屬可憂生鱉甲丹皮軟白薇玉竹天花粉香青蒿紫菀兜鈴黃芩炒牛蒡加蘆根復診溫邪歸併胃腑大便雖通熱不能解舌焦乾下見蛔蟲脘痞腹痛左脈弦大而數汗出頻頻里症偏重擬厥陰陽明泄熱法犀角尖赤芍枳實炭黃芩元明粉金鈴子鬱金白頭翁元參鉤鉤復診汗下不解氣喘鼻扇總有上脫之危勉方人中白兜鈴炒牛蒡花粉地骨皮桑白皮蛤殼飛青黛元參加蘆根案伏溫候無大熱刻下惡寒特甚舌心胎灰頭昏欲眩脈數無力老年液枯防有痙厥風波軟白薇玉竹淨柴胡黃芩元參心全當歸天花粉生地粉丹皮茅根肉案伏溫發斑四肢厥逆脈細數脘痞自利耳聾神蒙邪在厥陰不得傳出少陽此兩感極危之症細柴胡枳實炒赤芍連翹炙甘草金鈴子鬱金案伏溫發斑之下反見痙厥神昏舌焦強遺尿陰所謂熱深厥亦深也症屬難挽生鱉甲丹皮淨連翹元參軟白薇淨蟬衣鉤鉤茅根肉案溫熱發斑疹乾嘔吐蛔脈小數邪深難出小川連黃芩淨連翹枳實全瓜蔞元參黑山梔蘆根案三焦溫熱內蘊脘痞呃忒舌強尖紅液傷邪極險犀角尖連翹全瓜蔞枳實淡黃芩元參飛滑石蘆根案溫熱伏邪陷入厥陰脈弦數小便頻數澀痛左脅痛掣不能轉側身仍微熱症屬棘手姑捷於應手乃妙龍膽草新絳山梔仁木通金鈴子黃芩細柴胡桃仁青蔥管二風溫案風溫汗泄咳嗽氣促右眠則嗽甚舌白邊灰幸勿昏喘為妙旋覆花苡仁地骨皮桑白皮炙甘草軟白薇肥玉竹絲瓜絡淡黃芩加蘆根案風溫汗泄目赤脈弦神帶昏蒙防其痙厥羚羊尖鉤鉤甘菊花白薇肥玉竹石決明連翹鬱金又據述汗泄神蒙兼之痙厥是系肝風懸擬一方候正生牡蠣龍骨羚羊尖桂枝生白芍甘菊桑葉案肺絡風溫留戀脈細數咳痰有汗左脅痛法以輕清透邪旋覆花杏仁軟白薇玉竹桑白皮甘菊鬱金荊芥穗花粉案風溫汗出不解外熱雖輕但咳嗽氣粗鼻扇諸症均未和平舌胎黃脈兩弦右脅刺痛又系痰邪入於肺絡最怕昏喘滋變旋覆花杏仁苦桔梗蔞皮炒枳殼桑白皮地骨皮淡豆豉肥玉竹白薇案咳血脈浮背惡寒寐則盜汗此少陰不足近受風溫也小心調攝為要軟白薇桑皮炒蘇子紫菀全當歸青防風荊芥苡仁浮麥案上受風溫下虛不攝以致咳嗽汗泄脈促數舌黃病機不善慎之軟白薇玉竹冬桑葉蘇子旋覆花牛蒡子大杏仁馬兜鈴炙甘草案風溫蘊肺漸擾心包脈虛弦舌燥無胎神蒙譫語鼻衄咳痰將有風動痙厥之變軟白薇玉竹冬桑葉鬱金人中白粉丹皮鱉甲連翹紫菀花粉炙甘草茅根肉案風溫汗泄咳嗽寒熱宜和營衛以清邪嫩桂枝白芍炙甘草白薇肥玉竹酒黃芩桑葉炒苡仁百部紫菀茸生薑紅棗案風溫上蘊頭面赤腫身熱脈數舌灰黑陽明毒火頗重宜清解之大豆卷連翹炒牛蒡甘菊鮮生地生甘草元參銀花青黛活管仲炒黃芩蘆根案久嗽復感風溫以致寒熱見血今脈尚弦數鼻塞不通宜從肺氣新邪調治旋覆花杏仁炒牛蒡兜鈴冬桑葉炒蘇子前胡生甘草地骨皮加蘆根案風熱咽腫兩邊色赤糾纏日久此時身無寒熱而脈象搏數由多進寒涼而未經開發也牛蒡子桔梗生甘草甘菊薄荷頭夏枯草馬兜鈴象貝元參蘆根三時行案溫疫發斑之際反見肢震神蒙舌心焦黑目赤譫語脘痞按之板窒邪蘊三焦兼涉厥陰矣病機極險羚羊尖赤芍淨連翹瓜蔞生鱉甲廣鬱金鉤鉤炒枳實竹心茅根案斑發之後狂雖定猶見瘛瘲情形舌乾縮遺尿陰傷邪不能化病涉厥陰時當立夏防其痙厥之變生鱉甲連翹廣鬱金元參粉丹皮軟白薇甘菊羚羊尖青黛甘中黃蘆根案溫疫斑疹隱約脈數大舌胎灰潤陽明邪勢方張幸勿昏譫為妙犀角尖元參連翹青蒿生甘草粉丹皮黑山梔赤芍葛根茅蘆根案時溫十日汗疹皆得大便亦通惟身熱不退神蒙囈語目赤呃忒兩脈猶數急不衰邪強莫制顯然矣症屬棘手小川連菖蒲汁炒連翹枳實瓜蔞皮黑山梔佩蘭益元散鬱金竹二青加蘆根一帖後減去川連加羚羊尖鉤鉤案時邪發斑疹汗亦頻出脈弦數大舌淡白素患便血宜兼顧之仿吳氏三甲散意元武板鱉甲炒赤芍連翹炒銀花軟白薇全當歸蟬衣茅根肉案斑邪鬱伏脈小數頭與骨節俱痛舌白無汗先以疏解三陽西羌活獨活苦桔梗前胡細柴胡江枳殼豆豉荊芥防風小川芎炙草蔥白案時邪復痛瀰漫上焦豆豉防風黑梔荊芥瓜蔞皮滑石秦艽廣藿蔥白案時邪鬱伏一候舌黃紋裂脈細無力身熱不盛正虛邪蘊殊為棘手淨柴胡枳實淡芩鱉甲連翹天花粉赤芍蘆根案時邪得汗熱不退脈猶細數而兀舌白便利其勢非輕檳榔尖厚朴大杏仁秦艽廣藿青蒿滑石炒赤芍案疫邪得戰汗表解而里未化脘腹痞滿嘔逆見蛔須防厥變法半夏川連全瓜蔞枳實炒赤芍人中黃赤苓金鈴子案脈虛細舌胎黃燥滿布身熱無汗脘痞按之而板年老陰枯時邪表裡蘊結症屬險重煨葛根山梔淡豆豉黃芩炒瓜蔞炒枳實青蒿知母案時邪郁遏疹點隱約舌黃脈弦數汗少大便未通肺胃經腑交病非小恙也牛蒡子連翹黑山梔黃芩炒枳實製大黃芒硝生甘草米鉤薄荷加竹葉廿片復診牛蒡子黃芩黑山梔米鉤炒枳實生甘草鬱金元參赤芍竹葉案發斑肢冷脈細大非所宜炙鱉甲米鉤歸鬚赤芍連翹漢獨活秦艽炙草蟬衣淡芩茅根肉案第二案邪結心營神蒙目赤脈仍小肢逆已溫症防痙厥羚羊尖元參鮮生地連翹粉丹皮甘中黃米鉤黑山梔鬱金淡芩加竹心茅根肉附涼膈散治心火上盛中焦燥實煩躁口渴目赤頭眩口瘡唇裂吐血衄血大小便秘諸風瘛瘲胃熱發狂及小兒驚急痘瘡黑陷連翹一錢大黃三錢芒硝一錢甘草一錢炒山梔一錢半黃芩一錢半薄荷一錢竹葉十片四痧案痧系陽邪最易化火所以舌絳胎黃但脈微數無神瀉雖止又增嘔逆呃忒正虛邪陷清補兩難陽證得陰脈屬相反之逆候方請高裁小川連附子汁拌炒製半夏赤苓廣橘白炙草枳實南沙參麥冬姜竹茹案痧疹連發紅白皆有前進內開肺氣喘逆少減仍見側眠偏臥心下高突如碗大似系邪結中焦為患非細故也擬小結胸例主治症機極險姜川連枳實瓜蔞桑皮法半夏地骨皮苡仁炒葶藶蘇子鮮竹葉蘆根案幼痧回太早灼熱鼻塞咳逆氣促皆由冒風之故擬開太陽法即得應手為妙炙麻黃杏仁煨石膏甘草苦桔梗炒牛蒡前胡連翹蟬衣五濕溫案濕溫壅遏三焦脈軟數舌胎黃厚氣促身熱灑淅惡寒立夏在即須防內陷昏喘之變豆豉杏仁黑梔滑石佩蘭連翹防風瓜蔞皮蘆根案濕溫瀰漫三焦噯氣脘痞大便未通舌胎灰黃滿布左脈兀數右較流動盜汗發疹病機郁遏不宣法以流利清邪淡豆豉山梔炒枳實佩蘭瓜蔞皮生麥芽滑石連翹鉤鉤蘆根案濕溫發熱經水不期而至舌胎黃膩得汗後脈猶數大昨晚厥逆幾回脘痞欲嘔此邪氣漫布三焦未曾陷入血分防其傳變淡豆豉枳實黑山梔鬱金瓜蔞皮連翹滑石白薇米鉤石菖蒲案濕溫蘊結三焦脘痞呃忒舌黃目赤頭汗不至足身熱脈小數若加昏憒便難措手擬吳氏逐邪法製大黃厚朴炒枳實柴胡炒赤芍生甘草連翹全瓜蔞蘆根復診得下後脈漸大邪結稍松但呃忒頻仍時有譫語濕溫被氣食兩郁病將二候不化難防昏厥小川連石菖蒲炒法半夏赤苓鬱金淨連翹米鉤益元散佩蘭制香附青蒿復診濕溫化燥陰傷舌焦涸神氣模糊沉沉欲寐須防痙厥滋變生鱉甲白薇肥玉竹元參廣鬱金淨連翹赤芍丹皮菖蒲茆根鮮竹葉復診生鱉甲青蒿連翹赤芍天花粉肥玉竹甘草佩蘭黃芩蘆根案濕溫郁毒斑色青紫舌胎黃厚滿布脈轉小數目赤神煩更加呃忒熱蘊結於胃腑症屬極險勉擬通解三焦佐以解毒法候裁生大黃芒硝生甘草山梔鬱金淡芩青黛豆豉元參細生地川連菖蒲汁炒服後大便行去大黃芒硝甘草加連翹人中黃佩蘭案病後黃癉
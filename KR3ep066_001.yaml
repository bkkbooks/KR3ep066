心包夾痰內閉滋清法無益矣勉擬芳香開竅怕其喘急昏厥便難措手天竺黃連翹鬱金米鉤元參心紫菀茸川貝飛滑石山梔枇杷葉另服至寶丹服後又起瀉去天竺黃元參加生白芍炙草炒銀花案年甫周歲感暑濕之氣而為吐瀉刻下肢冷唇青舌胎灰燥時有躁擾之形氣液兩奪邪陷至陰症勢最為沉重上條參麥冬醋半夏赤苓東白芍炙甘草枇杷葉荷筋案連進分清之品濕熱去半右尺脈猶數大舌胎焦黃未淨動氣依然口中焦臭胃家黏膩之邪一時難以清化法宗前議藥取輕鬆綿茵陳山梔元精石佩蘭飛滑石炒茅朮赤苓豆卷青蒿連翹淡竹葉茅根案大勢已解惟舌尚焦乾咳痰濃濁津液未得全回痰火膠黏肺絡右目多赤宜清金泄木法西羚尖花粉鮮沙參元參炒知母冬瓜子桑皮地骨皮蘆根案兩旬之病脈數大不衰身熱面赤舌胎黃膩咳嗽痰稠肺胃痰熱未清久則生變冬瓜子苡仁西羚尖桑葉地骨皮瓜蔞皮花粉酒芩滑石蘆根案心經蘊熱得清而化所以神識稍清舌起黃薄之胎但脈猶數大咳嗽音啞其勢漸移肺絡居多宜輕清上焦兼以熄風和陽法西羚尖貝母生甘草淨連翹桑皮天竺黃桔梗紫菀茸白薇活蘆根案大便已泄三次腹如仰瓦舌胎脫化尚嫌紅燥脈雖稍起虛數不靜胃腑之邪結無幾身中之津液難回救陰無速功仍屬可虞臺參鬚麥冬細生地桑葉阿膠人中白川斛地骨皮茅根枇杷葉案汗下兩得身熱不退耳聾咳嗽脈來弦數邪留肺絡尚需白疹補發青蒿黃芩生甘草連翹花粉貝母鬱金蒡子白薇尖鉤蘆根案肺邪蘊遏咳喘發熱病機險重炒牛蒡前胡杏仁桔梗蜜兜鈴淡芩香薷枳殼冬瓜子復診脈微身熱喘急音啞舌光絳胎黃脘腹痛脹此陰虛於下邪蘊於上症屬險迫炒枳實瓜蔞冬瓜子苡仁兜鈴炒牛蒡桔梗飛滑石元參案濕熱內蘊分利不應舌黃脈數大脘痞時痛得嘔乃寬間有寒熱此中焦之病擬瀉心開解法姜川連赤苓熟半夏枳實柴胡炒猴姜青皮金鈴子香附炒神麯案舌轉潤脈亦數大但身熱未退營陰之邪達於衛分尚恐傳變擬仲景太陽陽明兩解法軟白薇玉竹酒當歸葛根淡芩粗桂枝白芍炙草案清火而火不化救陰而陰不回勢將痙厥擬扶正清邪法臺參鬚一錢煨石膏甘蔗汁拌炒四錢炙草五分炙龜板四錢炒生地三錢肥知母炒二錢風梗米四錢案病及兩月形瘦腹膨脈郁數舌黑便泄正氣大傷伏邪究未盡徹難治漢獨活白芍炒銀花柴胡炒枳實大豆卷赤苓炙草案伏邪病後少腹尚有痛墜之形小便時或不爽汗泄頻頻脈細數無神舌紅胎黃薄陰分已虛濕熱余氛逗留調之非易金鈴子延胡粉丹皮赤苓地骨皮淡竹葉甘草細生地茅根案徐右伏暑病經十日脈來弦數舌紅便泄身熱少汗望其發疹轉瘧漸次而解症屬糾纏可慮香青蒿葛根淡芩赤芍粉丹皮大豆卷連翹炙草茅根復診疹雖未見有轉瘧之象法半夏赤苓青蒿赤芍丹皮淨連翹甘草淡芩竹茹生鱉甲淨柴胡案張右五十伏暑夾氣鬱淹延三候熱勢下午則甚舌黃脈數諸恙並無增減惟脘痞鬆解藥不見效宜候高明再議擬丹溪法未識可否姜山梔建曲淨連翹米鉤制香附粉丹皮川芎薄荷頭青蒿省頭草案第一案重九日伏邪瀰漫三焦汗多不解脈數脘悶便泄氣粗最怕神昏痙厥淡豆豉三錢黑梔三錢枳實一錢半大杏仁三錢滑石三錢淨連翹三錢前胡一錢半全瓜蔞三錢石菖蒲一錢半米鉤三錢加蘆根一兩又方初十日鮮生地一兩丹皮一錢半野鬱金一錢半連翹三錢大黃酒炒一錢半烏犀尖一錢半赤芍一錢半第三案十一日伏火劫陰入營舌焦涸而強神昏譫語下後不解症勢最為險重烏犀尖一錢半元參三錢鮮生地一兩鱉甲一兩連翹心三錢粉丹皮一錢半鬱金一錢半淡芩一錢半知母一錢半加竹葉茅蘆根煎湯代水另服紫雪丹五分又方十二日小川連七分炒菖蒲一錢半淨連翹三錢野鬱金一錢半黑梔三錢綠蘆薈一錢真青黛一錢淡芩一錢元明粉一錢酒當歸二錢酒大黃二錢生甘草五分龍膽草酒炒二錢又方十三日酒大黃一錢半連翹三錢生山梔三錢黃芩一錢小川連七分炒菖蒲一錢半鬱金一錢半薄荷頭六分生甘草五分青黛三錢元參心三錢竹葉廿片白蜜三匙衝入另服萬氏牛黃清心丸一粒石菖蒲汁化案凌左脈弦大少數舌胎黃白微燥身熱汗少伏邪未化津液就燥擬歸葛飲意酒當歸一錢半葛根一錢青蒿三錢花粉三錢淡竹葉淡芩一錢半炙甘草五分赤芍一錢半大豆卷八錢姜皮四分加竹葉廿片案左復病身熱又將半月脈細數舌黃咳嗽小便不爽正陰大傷暑濕熱三氣蘊伏最為可慮益元散杏仁冬瓜子桑皮地骨皮細生地木通淡竹葉苡仁川萆薢赤苓加蘆根西瓜翠案常十二吐瀉之後即起驚厥是系夾虛慢驚風之症刻診脈兀小無神鼻冷舌強身無大熱神氣困倦中虛伏熱調治甚為棘手節屆霜降難防滋變軟白薇元參淨連翹鬱金肥玉竹遠志炭甘草石菖蒲米鉤天竺黃薄荷頭第二案幼年瀉後鼻冷脈小煩躁身熱唇焦齒垢舌胎黃厚干強難伸伏火內燔陽症陰脈最難調治烏犀尖連翹鮮生地元參野鬱金益元散另服牛黃清心丸第三案厥逆回脈亦起伏熱有外達之機但身熱未退時時煩躁心肝風火不熄尚恐反復烏犀尖元參鮮生地連翹石決明軟白薇鬱金甘中黃第四案伏暑驚厥之後內症雖平身熱不解津液傷而汗難得必待汗出自然白疹布發方有向愈之期青蒿黃芩花粉甘草粉丹皮生首烏連翹鬱金杏仁炒赤芍薄荷頭葛花茅根肉案何邪伏三焦手少陽無陰則何以化生鱉甲米鉤粉丹皮鬱金西羚尖黑梔連翹青蒿甘草南花粉大杏仁前胡加蘆根案曹濕熱伏邪陷入厥陰脈郁數小便頻數澀痛兼有赤色成淋左脅痛掣不能轉側身仍微熱症屬棘手姑擬疏泄肝邪捷於應手乃妙龍膽草柴胡山梔仁黃芩童木通金鈴子桃仁旋覆花新絳青蔥管案左四旬暑濕濁邪蘊結下焦膀胱氣化不行肝經疏泄失職以致少腹脹滿作痛小便澀而不利脈來弦細病經半月正氣漸虛雖有對症之藥恐難見效炒蒼朮肉桂赤苓豬苓金鈴子福澤瀉滑石青皮延胡寒水石陳海蜇漂淡一兩大荸薺淨打六個煎湯代水案張右二十餘伏邪深藏未達少腹痛寒熱無汗舌乾燥脈弦數津傷熱鬱勢在輕出重入之間淨柴胡赤芍粉丹皮枳實酒延胡金鈴子米鉤花粉連翹茅根肉案薛右二十六伏邪寒熱往來四肢厥冷脘痛無形脈弦數舌燥經水適來將止病在厥陰少陽之間勢非輕淺淨柴胡赤芍炙草枳實白薇旋覆花新絳粉丹皮歸鬚加蔥管第二案邪留厥少兩經最怕糾纏滋變淨柴胡赤芍粉丹皮連翹南花粉軟白薇元參金鈴子延胡淡芩炙草茆根肉第三案厥陰之病減少陽伏邪逗留艱出糾纏可慮青蒿黃芩南花粉丹皮連翹炙草白薇鮮生地米鉤鬱金茆根肉案黃左九月二十三日伏邪汗多旬日不解脈弦數舌胎黃白疹雖見猶寒熱往來症屬糾纏難愈炒牛蒡連翹大豆卷黃芩飛滑石大杏仁青蒿花粉米鉤淨蟬衣淨柴胡又診廿五日汗疹暢徹熱猶不止脈細數舌淡白正虛邪戀之象總屬糾纏難愈炒牛蒡連翹地骨皮青蒿花粉炒枳實赤芍炙草柴胡茆根肉甲戌八月廿七日鈔至此七霍亂案霍亂脈細肢冷舌胎黃嘔逆氣喘煩躁伏暑鬱於內陽氣亦陷入厥陰陽明病甚危急先服來復丹二十丸法半夏赤苓廣藿香米鉤益元散炒木瓜麥冬烏梅炭大豆卷五味子加連梗荷葉伏龍肝湯代水煎案霍亂轉筋其勢險而難測醋半夏赤苓益元散藿香炒木瓜元精石木通淡竹葉荷葉另服來復丹廿粒八瘧疾案暑瘧將一月寒熱交爭汗多脈細數舌微黃口苦欲嘔飲食甚少兼有肢麻頭眩情形虛多邪少擬和解扶正法青蒿黃芩醋半夏赤苓白夕藜麥冬炙草制首烏洋參穭豆衣荷葉邊案伏暑類瘧小便不利柴胡黃芩淡竹葉赤苓小青皮金鈴子山梔甘草梢滑石案久瘧脈弦細舌微燥兩脅痛伏邪在半表半裡之間宜和解通行柴胡黃芩天花粉青皮枳殼丹皮川芎夕藜桑葉炙草案寒熱脈細數舌紋裂胎白正虛邪伏望其轉瘧乃輕細柴胡黃芩炙甘草檳榔尖小樸製半夏茯苓當歸加薑棗案復病似瘧舌胎白汗大泄脈細身熱得之傷暑製半夏赤苓廣藿香小樸木瓜炭佩蘭滑石青蒿案久瘧邪猶未徹脈數口甘尚宜疏解分清淨柴胡黃芩法半夏青皮黑山梔佩蘭滑石淡竹葉赤苓案瘧邪化燥薄肺咳嗽音啞治在上焦冬桑葉杏仁冬瓜子桔梗肥玉竹青蒿黃芩南沙參花粉生甘草案自夏入秋咳嗽纏綿但畏風並不發熱白露後寒熱交作脈弦數舌滑總屬伏邪為瘧之象不可認其虛損變端仍宜和解表裡旋覆花苡仁青皮檳榔茯苓青蒿知母法半夏小樸炙草桑葉橘白案右脈數大但熱無寒是為癉瘧兼有咳嗽宜從肺胃兩經調治嫩桂枝杏仁肥知母小樸青皮煨葛根黃芩炙甘草赤芍案伏邪久留癉瘧無汗舌光脈小數陰血不足之體難任疏泄法宜和解淨柴胡當歸青蒿黃芩丹皮花粉小青皮炙甘草赤芍案脈細澀數寒熱如瘧舌胎白浮膩脘痞按痛募原伏邪未達防其中滿尖檳榔小樸青皮黃芩草蔻仁淨柴胡赤苓半夏曲案瘧邪未盡足腫及膝脈細數舌白症屬糾纏柴胡青皮製半夏黃芩赤苓炙甘草小樸川牛膝木瓜苡仁案瘧後氣虛發腫自下及腹小便通利非濕也甜桂心冬朮枳實炭桑皮茯苓厚杜仲苡仁冬瓜子杏仁砂仁殼川牛膝木瓜案瘧後轉瀉舌黃紋裂脈左細右數大暑邪內傳老年陰枯燥劑不宜此為難治東白芍炙甘草炒銀花赤苓青防風柴胡枳實鮮荷葉案瘧根未斷腹漸脹滿脈微細中虛邪湊之象調之非易雞內金新絳旋覆花枳實小青皮冬白朮小樸柴胡赤苓砂仁殼案三瘧兩月經期即阻而不止脈來細數伏邪深入厥陰一時難愈海南子小樸肥知母黃芩軟白薇小青皮草果烏鰂骨茜草石菖蒲復診三瘧未止兼以腹脹咳嗽脈左偏弦難調之恙甜桂心冬朮炒枳實桑皮茯苓厚杜仲苡仁冬瓜子杏仁砂仁殼川牛膝木瓜復診三瘧雖亂邪究未徹脈虛而數盜汗咳嗽似屬轉出肺經擬和營衛法嫩桂枝生白芍炙甘草大杏仁制川樸生牡蠣小青皮炒苡仁冬桑葉全當歸軟白薇肥玉竹案髫年寒熱日作煩躁神蒙時有痙厥之勢脈弦數汗出不至足邪留少陽厥陰之間糾纏可慮羚羊尖鉤鉤黑山梔丹皮鬱金童木通連翹益元散生甘草石菖蒲加竹葉案瘧象雌雄脈細數無力舌胎黃膩平素多痰而形體卻瘦汗泄食少此濕熱內蘊陰分又不足法宜緩調自愈法半夏赤苓小青皮川樸炒山梔生牡蠣冬朮福澤瀉佩蘭鹿含草心會白姜竹茹案陸上嘔下瀉瘧勢寒戰熱微脈細舌膩痰多中虛濕矇混症非輕淺炒茅朮防風法半夏豆卷廣藿香陳皮炙甘草厚朴生薑案久瘧結癖在於左脅脹及半腹寒熱三日一至怕延中滿難治炙鱉甲青皮尖檳榔蔻仁淡芩法半夏赤苓炙甘草柴胡炒枳實炒冬朮知母

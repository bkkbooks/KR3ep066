body:
  text: 卷中一痢疾泄瀉案下利舌胎老黃左脈數大嘔惡不食暑邪傷胃最險最危之候毛川連薑汁炒熟半夏赤苓炒銀花黑石蓮石菖蒲省頭草滑石案右脈數大泄痢白積此暑熱內侵也銀花炭滑石炒茅朮赤苓青防風廣藿香小朴楂炭案泄痢不止脈細舌白腹脹面目浮腫近加寒熱如瘧正虛邪陷症屬難調甜桂心赤苓炒白朮豬苓炙草淨柴胡白芍炒枳實澤瀉案久痢脈弦數形瘦食減陰傷邪陷糾纏可慮白頭翁紫菀獨活炙草炒白朮炒銀花炮姜黨參案久痢氣機下陷或瀉或便血脈微數無力脾腎兩傷矣炒熟地炮姜粉歸身白芍雞內金菟絲子黃耆冬朮案痢經兩月近加寒熱脈細數而兀食減氣液皆傷新邪外束延久恐防不起淨柴胡獨活炒枳實炙草白芍銀花炭楂炭豆卷紫菀案久痢陰傷腹痛此係腸膏竭絶脈絡枯澀不宜再用香燥制首烏丹參穭豆衣紫菀漂蓯蓉全當歸鬱金白蒺藜案痢久脈微肢腫食減正氣大傷邪陷太陰難治炒茅朮炮姜制川附獨活茯苓炙甘草小朴荷葉蒂案久痢氣血兩虧風陽內動慎之制首烏當歸懷牛膝桑葉穭豆衣西洋參麥冬肉炙草丹皮案久痢氣血兩傷形瘦腹滿脈弦數舌邊紅胎黃症難調治熟地炭冬朮炭銀花炭炮薑炭枳實炭雞內金炒赤芍紫菀茸案痢久脾虛清陽下陷分利不應轉擬東垣益氣法西黨參黃耆炒茅朮升麻柴胡全當歸白芍青木香陳皮炙草案久痢傷腎清陽下陷肛墜大便不爽調之非易炒熟地升麻炙甘草猴姜漂蓯蓉菟絲餅杜仲茯苓案久痢便血腹尚痛小溲濁而不清此濕熱傷陰窮則及腎也銀花炭當歸東白芍茯苓炙草獨活阿膠花粉紫菀旱蓮草案痢後復發熱脈數大陽明新感法宜辛涼解表煨葛根秦艽豆卷青蒿飛滑石淨連翹赤芍案痢後腹脹足腫脈微欲絶脾腎兩敗症難圖治制川附茯苓冬白朮白芍炒枳實上臺參另服濟生腎氣丸半斤案痢後右足痿痹行步維艱脈細面白形瘦此係氣血兩虧筋脈失養宜從肝腎調治厚杜仲狗脊菟絲子木瓜懷牛膝黃耆青防風炒苡仁當歸另服虎潛丸案痢後大便溏泄腹脹足腫納穀則欲嘔此脾虛不能健運也冬白朮旋覆花白芍赤苓法半夏炒枳實青皮防風竹茹案暑邪內陷下痢不食已經八日脈沉細數無力舌胎老黃冷汗嘔惡噤口危疴宜候高明裁酌毛川連菖蒲同打炒醋半夏赤苓淡芩黑石蓮赤芍木瓜炭甘草案下痢不食脈虛嘔惡有噤口之勢小川連薑汁炒法半夏赤苓黑石蓮石菖蒲紫菀楂炭佩蘭廣藿香鮮荷蒂案泄瀉脈數大舌胎白高年當此慎勿忽視煨葛根赤苓銀花炭防風白扁豆炒木瓜白芍炙草荷葉案脈細而遲腹痛泄瀉此脾氣虛寒也冬朮白芍炙甘草防風茯苓雞內金木香菟絲子杜仲加薑棗案久病後面色痿黃脈軟弱無力並非外邪有餘乃氣血兩虛也法宜調補西黨參茯苓冬朮炙甘草制首烏穭豆皮牛膝粉歸身薑棗另服六味丸案沈痢經旬日胃不思納厄忒不止臺參鬚麥冬肉北五味白芍炙草醋半夏茯苓心會白沉香加柿蒂第二案痢少止厄忒略平但脈仍細弱無神力倦臥舌乾邪輕而氣液大傷矣終防喘脫之變前方去柿蒂加黑石蓮案瀉痢已緩脈弦大舌紅咳嗽身有微熱耳聾出水乃濕邪上郁清竅擬和解少陽法冬桑葉丹皮甘菊赤芍炙甘草青蒿梗米鉤炒銀花苦丁茶白薇苦桔梗案噤口痢經月外肢冷舌紅紫自覺內熱如燎煩躁乾嘔少腹脹痛脈微欲絶此係暑毒陷厥陰上下格拒氣液兩奪攻補難施之候症甚危篤小川連赤苓法半夏白芍炒枳實黑建蓮炮姜炙甘草烏梅湖蓮一兩案脈軟弱無力舌淡光滑噯氣食減大便濡泄脾胃兩虛勿得漫言肝氣也西黨參赤苓冬白朮炙甘草心會白熟半夏砂仁木香加荷蒂案脬宮下墜西黨參炙甘草冬白朮當歸綿黃耆心會皮柴胡醋炒升麻又方菟絲子杜仲桑螵蛸白芨懷山藥沙苑蒺藜黃耆制首烏鹿角霜上諸品納入豬脬中煎案曹右二十泄瀉脈微勢防厥變甜桂心茯苓福澤瀉豬苓法半夏冬白朮木瓜廣藿佩蘭案寒熱瀉痢兩月不已腹膨足腫色萎黃食減伏邪內陷脾腎皆虛難治西黨參炮姜冬白朮炙草厚杜仲菟絲子歸身白芍苡仁獨活雞內金紫菀案左七旬瘧後轉瀉舌黃紋裂脈左細右數大暑邪內陷老年陰枯燥劑不宜此為難治銀花炭白芍炙甘草赤苓炒枳實青防風柴胡案左六旬脈軟數不食痢下無度暑濕熱內遏三焦正虛邪陷症屬極險炒茅朮廣藿炒銀花楂炭黑石蓮石菖蒲赤苓法半夏紫菀白頭翁案伏邪淹纏日久傳為痛痢脈細如絲正虛顯然不可因循玩視炮薑炭五分防風一錢焦白朮二錢白芍二錢炙甘草五分炒黨參二錢赤苓三錢木香五分廣藿一錢加姜一片棗三個案脈沉數血痢無度暑邪陷於下焦擬通因通用法酒大黃三錢赤芍一錢枳實炭一錢半楂炭三錢全當歸一錢六一散三錢紅曲三錢豆卷三錢鬱金炒一錢半案王左十三初起寒熱便泄傳為痢疾脈左多弦數舌胎黃膩腹痛無休下皆紅積垢滯後重裡急伏邪下陷十日不止幼年弱質最怕淹纏胃倒刻下用藥挽之不及清之不應若但調氣去積亦屬潦草塞責勉擬潔古法冀扭轉機關為幸酒大黃一錢白芍一錢半炙甘草五分檳榔八分酒當歸一錢炒豆卷三錢楂炭三錢炒銀花三錢紅曲三錢六一散三錢野鬱金一錢半又方酒川連五分白芍一錢半炒阿膠一錢炙甘草五分炒銀花三錢酒當歸一錢楂炭三錢案冬溫內陷下痢無度舌灰黃脈象歇止症屬棘手炮薑炭紫菀銀花炭楂炭炙甘草漢獨活青防風苦桔梗白茯苓炒白芍青木香嫩白薇小川朴荷葉蒂二冬溫案冬溫傷肺咳嗽發熱得汗後脈猶數大氣喘痰鳴頭汗淋漓時欲起坐有正不勝邪之慮症屬棘手勉方候裁旋覆花杏仁黑梔豆卷軟白薇玉竹石膏牛蒡兜鈴案冬溫傷肺勢在方張蜜麻黃杏仁炙甘草葛根酒當歸炒蘇子黑梔旋覆花白薇案冬溫寒束舌紋裂無胎咳痰氣粗壯熱無汗氣液兩虛之體最為棘手蜜麻黃杏仁酒當歸炙甘草玉竹旋覆花軟白薇炒蘇子案冬溫傷肺咳嗽發熱兩候未曾得汗反見吐蛔噯氣舌光無胎胸中攪擾兀兀欲吐脈左數右無神肺邪未徹內挾肝木乘胃症情夾雜難調小川連姜水炒南沙參麥冬肉醋半夏炒枳實黃芩地骨皮紫菀桑白皮赤苓二帖後減川連加羚羊尖案冬溫寒熱咳嗽脈細無神捱過至節乃是旋覆花杏仁桑葉白薇法半夏炒玉竹當歸麥冬肉蘇子炙草案冬溫發熱無汗咳嗽氣逆舌胎灰黃脈弦數表未解裡熱已深擬開肺胃兩經之邪蜜麻黃杏仁炙甘草石膏黑梔豆豉葛根軟白薇案寒鬱溫邪發熱無汗脈數大舌胎黃白咳痰色緑目赤脘痞肺胃經邪未徹夾痰熱以壅逆防其昏喘蜜麻黃杏仁炙甘草石膏瓜蔞皮炒蛤殼江枳實法半夏黃芩案冬溫邪火心營肺肝皆受病症屬棘手鮮生地元參煨石膏知母生甘草羚羊尖白薇炒黃芩茅根蘆根案冬溫一候不得汗脈弦數舌焦燥紋裂唇乾齒板目紅顴赤脘腹痞硬而痛音低氣促總屬液枯邪陷症情極為險重酒川連瓜蔞炒枳實青皮生麥芽苦桔梗蘆根案冬溫咳嗽交加微有寒熱舌乾燥脈數高年津液就燥法宜輕清開肺軟白薇玉竹旋覆花杏仁炒蘇子全當歸青防風炙草案冬溫蘊肺咳嗽痰鳴得汗不解舌乾燥脈虛數老年氣液俱虧須防喘脫軟白薇玉竹天花粉桑葉全當歸旋覆花大杏仁炒蘇子案冬溫時毒發於面寒熱咳嗽治在肺胃炒牛蒡甘菊生甘草桔梗淡豆豉黑梔荊芥夏枯草馬勃杏仁案寒鬱溫邪包裹肺絡病經十日得汗身熱不解脈猶數大咳嗽痰鳴舌白燥時有譫語神蒙之狀症屬險重蜜麻黃杏仁煨石膏知母黑梔淡豆豉紫菀連翹白薇玉竹蘆根案冬溫氣血兩燔症屬極險鮮生地麥冬煨石膏知母炙甘草軟白薇元參鮮竹葉案冬溫寒鬱傷肺發熱無汗右脅痛舌裂涸咳嗽氣急脈緊數時形歇止年老液枯怕見昏喘蜜麻黃杏仁煨石膏炙甘草白薇肥玉竹兜鈴炒牛蒡葛根蘆根案寒熱似瘧脈緩弱舌黃白膩厚此冬溫深伏正虛不能托出勢防傳變嫩桂枝黃芩柴胡赤苓製半夏白薇肥玉竹炙草豆卷加薑棗案譫語神蒙腹滿身重難以轉側痰鳴時增時減舌焦唇燥症屬極險蜜麻黃杏仁炙甘草石膏軟白薇肥玉竹知母案寒溫錯雜之邪鬱於肺衛寒熱咳嗽舌黃旋覆花杏仁江枳殼前胡苦桔梗淡豆豉防風炒牛蒡黃芩蘆根案趙右寒鬱冬溫蘊肺鼻塞氣粗咳嗽脈數急舌胎黃厚時有錯語壯熱無汗病經旬日不解勢多傳變蜜麻黃杏仁煨石膏生甘草苦桔梗旋覆花前胡姜枳殼桑皮豆豉蔥白案左二十四脈數壯熱無汗咳嗽脅痛舌胎黃中心剝光溫邪蘊於肺胃其勢方張煨葛根豆豉黑梔杏仁酒當歸枳殼桔梗白薇連翹鮮沙參生甘草茅根案口鼻見血舌胎黃中光爍身無熱脈弦數睪丸引痛此冬溫內蘊外寒暴加也軟白薇元參青木香荊芥黑梔豆豉米鉤旋覆花茜草茅根肉案初六溫邪十日汗出不解左脈小而無神右脈弦數舌胎乾燥神識憒憒年老液枯火甚風生勢將痙厥羚羊尖丹皮淨連翹元參鬱金細生地米鉤烏犀尖磨沖三分服二劑初七加竹葉三十片茅根肉一兩初九復液枯火爍症屬可虞煨石膏五錢生甘草酒芩葛根知母三錢青蒿細生地五錢元參三錢蘆根案哮喘感溫邪痰聲如曳鋸脈弦數舌紅胎黃身熱無汗病經一候不解怕有陽升喘急之變羚羊尖鉤鉤旋覆花杏仁軟白薇元參心大貝天竺黃黃芩枇杷葉案久患血淋近感冬溫而發熱右脈弦數兩足拘急淋家不可發汗陰虛邪戀最為棘手交春怕其滋變炙鱉甲紫菀淨柴胡枳實當歸順軟白薇丹皮炒赤芍茅根肉案溫邪傷肺胃二經脈滑數大舌無胎壯熱咳嗽心煩不得汗急以開解怕有昏喘之變蜜麻黃杏仁煨石膏炙甘草煨葛根白薇肥玉竹連翹甘菊復診去連翹甘菊加當歸又開解肺胃二劑不得汗舌胎起黃燥脈大已衰咳嗽痰鳴蓋汗乃血之液必系年老津枯所以未能取效自宜清燥生津內通肺氣煨石膏麥冬鮮沙參杏仁炙草桑葉花粉馬兜鈴紫菀炒牛蒡又去石膏加海浮石蟬衣案神蒙氣粗語言難出舌短不伸脈細數無力全屬正虛邪陷總為難治小川連白薇雞子黃一個衝入阿膠人中白生白芍玉竹案冬溫蘊肺血上溢音啞咳嗆經久不已牛蒡杏仁苦桔梗白薇紫菀茸夏枯草甘菊生甘草兜鈴加蘆根三傷寒案傷寒漏底身無大熱咳嗽氣促脈微右伏模糊脘腹反見痞結拒按症非易療旋覆花杏仁全瓜蔞苡仁獨活大豆卷薤白北細辛蔥白一帖後加桂枝當歸炙草案傷寒漏底嘔吐黃水咳嗽身微熱舌白厚脈細如絲此夾陰夾虛兩感蜜麻黃細辛淡川附杏仁炙甘草茯苓薑片案風寒兩傷營衛壯熱無汗脈數大舌胎白燥氣喘痰鳴咳逆鼻煽急宜兩解表裡防過冬至勿加昏喘為妙蜜麻黃杏仁煨石膏甘草軟白薇旋覆花肥玉竹案右脈緩大寒熱惡寒甚舌白左脅刺痛此寒傷太陽陽明兩經也幸勿傳變為吉嫩桂枝小朴炙甘草葛根大杏仁旋覆花白芍白薇姜棗案脈數大舌胎黃膩嘔逆身痛壯熱無汗此寒傷太陽陽明二經也蜜麻黃葛根杏仁秦艽廣藿香炒枳實山梔豆豉案脈急數不勻身熱無汗此寒傷營之慎勿忽視蜜麻黃桂枝炙草杏仁淡豆豉黑梔白薇肥玉竹案入浴受寒便起咳嗽自冬及今將交夏令依然不定背微惡寒時有寒熱脈緊數不調此邪深入少陰非比皮毛肺病也擬溫散法從少陰托出其邪制川附麻黃北細辛苡仁霜桑葉旋覆花白薇玉竹案邪陷入陰先漏底而後厄忒病經兩候舌焦涸喉間痰阻腹中時痛總屬難挽再從厥陰陽明以泄錯雜之邪金鈴子延胡元參心紫菀青皮白薇白芍旋覆花鉤鉤炒枳實加青蔥三枝前方用大補陰丸案傷寒漏底無汗脈兀數無力舌紅胎少咳嗽不爽利表邪內陷夾伏冬溫症屬險重苦桔梗前胡西羌活五分柴胡五分杏仁生甘草獨活五分枳殼川芎五分炒白芍赤苓陳茶葉一錢半生薑淡芩四肝風案肝風上擾頭昏巔痛加以神思恍惚宜開懷怡悅為要生牡蠣甘菊穭豆衣丹參朱茯神粉歸身遠志制首烏女珍枸杞子柏子霜常服蓮心桂圓湯案素有肝病近因瘍毒久延正氣已虧以致肝陽上冒脘痛氣逆脈虛神倦時嘔時厥症屬險重勉擬通滯冀其痛緩再商旋覆花青皮法半夏鬱金代赭石金鈴子延胡白薇甘草石決明蔥管竹茹案眩暈汗泄肢冷睡中警惕嘈雜善飢脈左數何非肝風之病殊費調理石決明龍齒陳阿膠白芍雞子黃朱茯神棗仁杭菊炭炙甘草加金器同煎案肝風痙厥之後身有寒熱脈弦遲舌乾燥氣動厄忒此木邪挾相火上衝不制擬丹溪法原生地元武板川黃柏知母軟白薇雞子黃阿膠案肝木不能條達鬱極乃發為顛其中必有痰阻製半夏朱茯神遠志陳膽星石決明米鉤羚羊尖橘紅石菖蒲天竺黃杭菊鬱金竹瀝薑汁另服白金丸後服遂志丸案舌素黃脈大不時面熱帶下齒血此係胃熱家濕熱更兼肝陽擾動也羚羊尖山梔石決明赤苓川石斛車前子蘆根淡竹葉加野薔薇根案肝風痙厥脈弦細肢麻逆冷厄忒至則發痙當此春令又歲值風木司天其勢難平生牡蠣枳實生白芍炙草金鈴子製半夏茯苓新會皮麥冬鮮沙參穭豆衣杭菊加竹茹案懷抱久郁鬱極而發交春陡起痙厥手握口噤神氣昏迷脈郁數舌胎黃薄不時寒熱此肝風挾痰擾逆心包也症非易愈製半夏竹瀝炒朱茯神遠志廣橘紅天竺黃枳實石菖蒲米鉤鬱金軟白薇金箔生薑汁竹瀝案脈弦大肢麻心悸時或頭眩上氣年已八旬精液就衰肝木失所涵養稟質又素系木旺法宜潛陽熄風大熟地元武板阿膠牛膝全當歸生牡蠣龍齒雲茯苓杭菊蒺藜雞子黃沖調案肝鬱化火脘腹痛舌黃脈弦數有力法宜疏泄厥陰金鈴子延胡黑梔丹皮小青皮赤苓鉤鉤案厥痛或嘔或泄脈弦帶澀面色萎黃兼之天癸淋漓病因總起於肝由氣分而傷血分久痛入絡之機已露一斑矣旋覆花新絳烏鰂骨茜草小青皮白薇歸鬚鮑魚乾案肝風頭痛久恙難平丸方大熟地歸身白蒺藜杭菊穭豆衣生牡蠣桑椹金香附茯神茺蔚子女貞子橘葉案血虛風動心悸怔忡耳鳴頭暈時有噯氣近又值崩漏之後法宜調補生牡蠣龍齒清阿膠杭菊枸杞子桂圓肉製半夏廣皮秫米黑建蓮云茯神竹茹案肝風入絡右臂痠麻左脈弦大頭暈耳鳴舌右半獨麻年老血虛防成偏中難治白蒺藜三錢杭菊三錢穭豆皮三錢當歸一錢羚羊尖一錢半炙乳香一錢苡仁三錢制首烏四錢桑枝一兩片薑黃一錢案頭痛而嘔眼淚口歪時或嘈雜究不能多納無非肝陽擾逆之故羚羊尖一錢半杭菊二錢夏枯草一錢四分炙草白蒺藜三錢法半夏一錢半橘白一錢半茯神三錢案肝風上擾包絡神明不安其位生牡蠣龍齒云茯神杭菊清阿膠穭豆皮棗仁雞子黃加金銀器同煎案肝風擾絡帶下不固生牡蠣黃菊湖蓮肉芡實烏鰂骨桑螵蛸杜仲黃柏茯神沙蒺藜菟絲子懷山藥上以淡蜜水丸如桐子大案耳聾出水頭痛而眩此肝風上越清竅被蒙也夏枯草桑葉苦丁茶甘菊石決明白蒺藜丹皮絲瓜藤連翹荷葉邊案四肢痠麻頭眩而痛是系肝陽擾逆至於脬宮下墜實難調治沙蒺藜杭菊穭豆衣丹皮桑螵蛸歸身牡蠣菟絲子白芨厚杜仲炙龜板案汗屢出脈弦頭暈耳聾心煩少寐自覺氣時上逆風陽擾動不息防過春分漸能平復石決明牡蠣地骨皮茯神桑葉棗仁生白芍炙草綿黃耆知母青防風案肉瞤怔忡肢麻頭眩汗泄頻頻無非風陽擾動之故生牡蠣龍骨制首烏茯苓穭豆皮杭菊懷牛膝桑葉白芍案肝膽氣火有餘脘痞噯氣時有嘈雜脈弦大而數擬溫膽義加以清泄和陽熟半夏茯苓廣陳皮桑葉石決明粉丹皮枳實杭菊白薇荷葉邊加竹茹案肝風擾逆甚則痙厥脈數不靜頭眩心悸耳鳴齒血無非水不涵木厥陽上升不制宜清心寡欲為要生牡蠣牛膝穭豆皮旱蓮草女貞子細生地茯神金石斛黑建蓮真金箔案素患便血今交夏至陡然痙厥神迷脈虛緩肢節牽引目上視太息語言無序此血虛風動擾亂心包神魂失守之象與痰火肝陽有餘之症迥別擬救逆安神熄風法生牡蠣龍齒朱茯神阿膠杭菊制遠志丹參石菖蒲棗仁川貝雞子黃白薇加金銀器同煎案肺腎陰虧由於肝陽擾動鮮百合元參人中白女珍旱蓮草粉丹皮桑葉麥冬肉牛膝石決明案素有肝風之恙耳鳴頭眩足脛浮腫今則周身肢節痠疼是又挾暑濕為病也從周痹例治之白蒺藜防風大豆卷秦艽杭菊川萆薢杜仲牛膝苡米仁木瓜炭案脈弦數舌乾燥形瘦不食此係肝鬱傷中陰虛生內熱情懷之病非草木所能治黑梔丹皮川石斛赤苓麥冬肉西洋參橘葉石決明案七情鬱結傷肝上則目失明下則少腹脹自宜怡悅開懷非草木所能治白蔻殼橘核小青皮茯苓青木香生牡蠣荸薺陳海蜇案中虛挾痰飲心悸頭眩胃脘亦形阻塞擬外臺法古臺參白朮茯苓法半夏炒枳實九香蟲福澤瀉淡乾薑案據述前日痧穢起因至今並無寒熱脈郁數短氣不足以息手足清汗泄舌灰干少腹高突而痛瘀濁時下小便利大便閉下之不爽此肝經氣血兩郁之象須防痙厥致變金鈴子延胡廣鬱金桃仁山楂炭省頭草米鉤軟紫菀案病因情志抑鬱鬱則生火現在脈細汗泄頭眩自宜怡悅開懷不必逐枝節而求治霜桑葉白薇地骨皮黃耆冬朮青防風赤芍甘菊牡蠣案風陽上越汗多微熱脈浮大頭目昏暈治以清泄少陽西羚尖桑葉肥玉竹連翹石決明軟白薇甘菊青蒿梗苦丁炙草案中虛木侮嘔止當培土養肝西黨參茯苓醋半夏白芍心會皮益智仁川椒一分烏梅炭一錢白蜜三匙案肝有風脾有濕自覺頭重足輕症可無虞莫期速效白蒺藜杭菊白朮杜仲穭豆皮懷牛膝萆薢狗脊米仁法半夏枸杞子木瓜案髫齡肉脫脈虛弦不能納穀者年餘上下都曾見蛔是系木邪乘土方書所謂蟲為下膈容或有之症難決斷使君子棐子肉烏梅肉新會白雞內金法半夏茯苓塊開口川椒案酒後著惱忽起刺痛時或咳嗽痰帶腥濁小便亦覺不爽脈左多弦大極宜戒酒靜養為是旋覆花新絳霜桑葉丹皮淡竹葉絲瓜子苡仁蛤殼粉青黛川貝甘草梢竹瀝姜案厥痛甚劇中虛木侮也開口吳茱萸十五粒金鈴子枳實法半夏小青皮赤苓延胡烏梅大杏仁七粒另服大南棗二枚同打和醋湯送下案病後唇舌肢麻此係陰液未復肝風擾逆也白蒺藜三錢杭菊一錢半穭豆皮三錢懷牛膝四錢西羚尖一錢半制首烏四錢丹皮一錢半全當歸一錢半白薇一錢半桑葉一錢半川石斛三錢案肢體麻木延及於舌時或嘈雜欲嘔此血虛風動厥逆類中之萌也穭豆皮三錢杭菊二錢清阿膠一錢麥冬二錢白蒺藜三錢女貞子三錢石斛三錢細生地四錢洋參一錢懷牛膝四錢黑建蓮三錢牡蠣三錢案年逾五十無端而舌強言蹇眼目昏花此類中之萌也大熟地八兩萸肉三兩麥冬肉一兩遠志一兩石菖蒲一兩五味子一兩黨參三兩川斛三兩杭菊二兩穭豆衣三兩靈磁石一兩辰砂三錢煉蜜為丸五類中風案痰厥類中胸脘清陽被阻自述窒塞不舒湯水難下脈大面右多腫擬河間劉氏法酒大黃三錢山梔三錢風化硝七分連翹一錢半酒天蟲二錢苦桔梗一錢黃芩一錢薄荷七分全蟲三隻瓜蔞四錢豆豉三錢竹葉草片竹瀝一杯薑汁三匙案鄭左五十八素有類風之恙今感暑邪而發刻下口噤不語神昏遺溺脈弦數肢振舌白膩內挾痰風鼓動一時機竅閉塞是名類中慮其喘脫法半夏赤苓炒遠志橘紅石菖蒲天竺黃枳實陳膽星米鉤竹瀝薑汁第二案機竅已開諸恙皆退但舌胎黃白兩目微黃脈弦細口吐痰涎暑熱未清夾身中素有之濕瀰漫三焦極宜小心調理法半夏赤苓益元散藿香澤瀉炒茅朮豬苓綿茵陳木瓜佩蘭案陽虛體肥之質畏寒脈遲手足不時振動中虛挾風為患勢防類中擬河間劉氏法大熟地四錢麥冬二錢山萸肉二錢遠志一錢石菖蒲一錢半巴戟肉一錢半川石斛二錢漂蓯蓉二錢黃菊二錢五味子五分制川附五分洋參姜水炒二錢六胃脘痛案濁氣上千胃失下行為順之常以致脘痹與背相引而痛擬通陽流氣為先猴薑炭建曲金香附杏仁瓜蔞皮法半夏薤白新會皮案七情鬱結之病宜自調適脘脹寒熱擬逍遙越鞠法金香附柴胡黑山梔建曲赤苓塊小青皮枳實法半夏竹茹案肝胃不和脘痛氣阻金香附神麯旋覆花新絳金鈴子小青皮延胡九香蟲甘菊青蔥管案氣鬱脘痛擬丹溪越鞠法加減金香附神麯廣藿香茯苓小青皮法半夏黑山梔茺蔚子案肝陽擾亂胃脘痛嘔逆微利制香附神麯淨柴胡枳實東白芍炙甘草小青皮法半夏茯苓上以蘇梗湯泛丸案氣鬱不條達七情病也肢麻乾嘔從肝胃論治法半夏米鉤石菖蒲遠志新會皮炒枳實赤苓白蒺藜廣藿竹茹案脈弦數形瘦食減脘脅不時攻衝作痛此木鬱不條達肝胃不和也西洋參麥冬法半夏茯苓金鈴子旋覆花新絳川石斛橘葉炒延胡案脘痛欲噯氣頻頻擬仲景胃虛客氣上逆例旋覆花代赭石法半夏茯苓北沙參新會皮炙甘草炒枳實案脘痛脈細納食即痛而嘔胃寒也製半夏茯苓新會皮炙草吳茱萸旋覆花香附案脈虛弦舌胎粉白面色萎黃納穀欲嘔此胃陽式微肝木乘侮也西黨參茯苓法半夏炙草新會皮吳茱萸柿蒂公丁香生薑案脈大而遲脘痛納穀則欲嘔肌肉日削此胃中虛寒氣上逆也從肝胃兩和法法半夏茯苓炙甘草川斛旋覆花新絳橘白金鈴子案脈空大而歇止納穀則脘痛而下利惡寒微熱小便色黃此中虛濕濁內阻也症非易治粗桂枝赤苓法半夏枳實金香附六神麯蔞皮淡豆豉茅朮吳茱萸姜山梔又診痛利止脈仍歇代惡寒未去此中下氣虛之故制川附熟地西黨參炙甘草粉歸身冬朮茯神加薑棗案脘痛多年近加濡泄而嘔此胃氣虛寒也甜桂心炮姜法半夏炙草雲茯苓新會皮丁香雞內金荷蒂案下手脈沉便知是氣症見痞脘噯氣頭面時有痤痱近日寒熱如瘧經脈動惕極宜寬懷為要擬逍遙法淨柴胡歸尾東門芍白蒺藜江枳實黑山梔連翹案多年脘痛納穀則甚得噯氣腹鳴乃已脈虛弦法當溫通擬久痛入絡意制香附延胡九香蟲青皮旋覆花金鈴子新絳高良薑青蔥案吐瀉之後納穀欲嘔右脈弦四肢微麻土傷木侮也擬肝胃兩和法醋半夏赤苓麥冬肉木瓜生白芍川石斛廣藿黃菊荷葉絲瓜葉案厥心痛與背相控內經之腎心痛也甜桂心三分蘇梗三錢法半夏三錢茯苓三錢川朴一錢角沉香八分案範右復診痛止後左脈弦嘔逆見蛔厥陰之病無疑上升之氣從肝而出一時未易和平旋覆花新絳延胡青皮金鈴子法半夏茯苓炒枳實姜竹茹案胃脘脹滿脈沉細而遲噯氣食少此係懷抱抑鬱非草木所能治法半夏茯苓蘇梗青皮金香附瓜蔞皮枳實小朴米鉤案脘痛經久近逆於胸脈弦數有力舌胎黃膩此係肝氣上撐清陽窒痹濁陰不降也擬仲景胸痹例治之全瓜蔞薤白炒枳實延胡金鈴子法半夏茯苓橘紅姜山梔竹茹七虛勞案齦爛出血脈來細數此陰虛胃熱也細生地犀角粉丹皮元參山梔炭甘中黃連翹茅根肉蘆根野薔薇根案陰虛胃熱不必紛紛論治西洋參麥冬川石斛牛膝原生地女貞子茯神旱蓮草地骨皮骨碎補案胃熱風動近來少寐乃陰虛目不瞑也川石斛知母酸棗仁秫米黃菊桑葉丹皮青蒿子茯神法半夏蘆根案心腎不交衝陽上逆宜靜養栽培為主炒熟地龍骨朱茯神牡蠣湖蓮肉沙蒺藜杭菊穭豆皮芡實枸杞酸棗仁案胃不和食艱下少寐心悸夢泄頻頻心腎不交故也宜清心寡欲為要法半夏秫米穭豆皮茯神酸棗仁生牡蠣蓮心金櫻子遠志新會白案陰陽造偏為寒為熱已久近加咳嗽欲嘔脈細數形瘦食減便溏虛損之病難治軟白薇玉竹桑葉紫菀粉丹皮人中白黃精炙草白芍案虛里跳動脈來細數無神陰虛陽浮宗氣泄也細生地阿膠元武板棗仁生白芍穭豆皮知母朱茯神川斛黑建蓮案陰虛陽浮喘促汗泄脈浮數而空當此春令尤屬不宜大熟地牛膝五味子麥冬酒當歸紫菀茸茯苓桑葉另服六味丸案失血咳嗽俱平近日寒熱轉重脈細無力並非新感時瘧之象乃因陽虛惡寒陰虛發熱也症難調治現在食減噦逆且從標治右旋覆花紫菀南沙參桑葉茯苓青蒿麥冬肉新會皮白薇炙草竹茹案張右二十餘咳血時發近來入暮體熱肌肉漸削脈弦數而駛虛損之象日著防血冒冬瓜子苡仁真青黛蛤殼紫菀茸陳阿膠炙草鮮百合湖藕青蒿子加西瓜翠衣八咳嗽案久嗽不止痰色帶灰脈弦頭昏此係痰飲聚於胃關於肺擬仲景法粗桂枝茯苓冬白朮炙甘草旋覆花真青黛蛤殼白蒺藜菊花枇杷葉薑汁炒案久嗽氣喘近來微有寒熱脈靜細宜用溫通肺氣法粗桂枝杏仁小川朴蘇子炙甘草旋覆花半夏曲案久嗽衛陽不固勞則時有寒熱舌胎黃薄虛多邪少擬和解法粗桂枝白芍炙甘草杏仁軟白薇肥玉竹紫菀淡芩薑棗案久嗽不止脈弦大頭痛舌胎薄膩雖未傳及他臟肺胃痰熱亦難清化擬清金泄木法西羚尖苡仁石決明甘菊旋覆花丹皮法半夏桑葉蘆根加竹茹案咳嗽鼻塞乃肺氣壅遏所致旋覆花辛夷苦桔梗香芷大杏仁江枳殼兜鈴絲瓜藤甘草案久嗽音啞脈細經雨所致其氣通於腎難治之疴旋覆花杏仁馬兜鈴細辛炙甘草法半夏香薷廣皮茯苓案微燥上薄以致咳嗽頭暈但體肥多濕之人年登花甲下虛上盛法宜標本兼顧冬瓜子米仁桑葉蘇子旋覆花西羚尖茯苓煨天麻半夏曲案面浮咳嗽氣促畏寒長夏及冬從未得汗脈微弱而數近來飲食大減此由雨氣傷腎宜從仲景溫散法制川附麻黃炙甘草杏仁旋覆花北細辛米仁案痰嗽多年頭汗至頸而還氣喘足冷此上盛下虛法宜納氣歸腎以冀少安其病根難脫矣大熟地四錢萸肉二錢懷山藥二錢茯苓三錢粉丹皮一錢半麥冬肉二錢澤瀉一錢半紫石英三錢牛膝一錢半五味子五分海浮石二錢沉香五分案久嗽之脈浮弦而數舌光白行走則氣喘是屬中虛痰飲聚於胃關於肺西黨參茯苓冬白朮炙草熟半夏麥冬肉桑葉心會皮案久嗽之脈弦中帶數形瘦氣促著左眠則不適近又右胸乳房刺痛肺肝兩病所謂金木相仇也計惟通絡調治扶持帶病延年而已旋覆花新絳絲瓜子桑葉粉丹皮柏子霜橘葉白炒米仁歸鬚案去冬嘔血旋起咳嗽兩月不止脈歇結代頭汗氣喘寒熱無定時肺邪久蘊失治節之令症屬難治冬瓜子百部桑白皮米仁炒蘇子瓜蔞皮白薇牛蒡子兜鈴蘆根案病後咳嗆氣促脈虛數年老陰虧肺胃失降殊難脫體北沙參麥冬肉炒苡仁桑葉炙甘草冬瓜子蘇子製半夏當歸案痧後咳嗽於今三年脈細數兼澀今春吐血頻作形肉日削聲嘶氣促著左眠則氣升倍甚肺傷在前肝亢在後金木相仇防成上損現交大暑時有寒熱或系新感暑風理宜先清外邪為是冬瓜子苡仁冬桑葉滑石鮮荷葉炒丹皮青蒿西瓜翠衣診復病狀時輕時重咳嗽寒熱久不能止音嘶氣促總之肺氣無權肝反來侮也有痧勞之象冬瓜子阿膠雞子清桑葉生牡蠣北沙參地骨皮囫圇玉竹蘋果枇杷葉復診寒熱咳嗽兩減宜和補之綿黃耆防風冬桑葉玉竹全當歸炒蘇子苡仁生牡蠣炙甘草枇杷葉案老嗽多年右脈大喉癢氣分燥也殊難霍然北沙參麥冬桑葉蘇子黑芝麻清阿膠炙甘草枇杷葉蜜汁炒用鮮百合煎湯代水另服丸方大熟地茯苓懷山藥丹皮清阿膠粉歸身蛤殼麥冬蘇子軟紫菀案宿哮感寒而發寒熱咳喘旋覆花杏仁杜蘇子麻黃全當歸法半夏廣皮桑葉前胡案進桂枝二陳咳嗽惡寒皆減轉擬金匱痰飲門中溫通健脾蠲飲法雲茯苓桂枝冬白朮杜仲炙草熟半夏橘白炒苡仁生薑紅棗後服丸方大熟地萸肉懷山藥澤瀉雲茯苓制川附丹皮五味麥冬肉胡桃肉西黨參杜仲案喘哮不得臥背惡寒宜用溫通開降肺俞法北細辛桂枝旋覆花杏仁製半夏雲茯苓廣皮炙甘草蘇子白芥子案久嗽見血脈虛軟形瘦大便不實無清寒止血理肺之義惟栽培生氣扶持帶病延年而已懷山藥苡仁西黨參阿膠軟白薇全當歸紫菀雲茯苓案久嗽之脈細而虛形瘦食少幸未成損其病根難脫矣法宜調補金水兩臟不可再投清劑以伐生生之氣北沙參麥冬全當歸熟地炒米仁懷山藥茯苓川斛案高年久嗽氣促脈來歇止肺腎兩虛治宜補攝炒熟地牛膝麥冬肉茯苓懷山藥黃耆皮青鉛五味案陰虛咳喘脈細無神擬金水六君煎意大熟地當歸茯苓炙草心會皮熟半夏牛膝炒蘇子案久嗽見血足脛腫脈大舌光紋裂脘痞硬痛擬瀉心開結法兼以清上小川連枳實瓜蔞皮桃仁冬瓜子骨碎補米仁制香附案先咳嗽繼失血自後咳嗆不已脈象弦數左脅一痛血即後見此係肝鬱傷絡木反侮金之候極宜寬懷怡養為要旋覆花新絳冬瓜子蘇子炒苡仁粉丹皮桑葉蛤殼桃仁泥青黛青蔥案久嗽絡傷血溢氣喘足冷厥脫堪虞勉擬景嶽鎮陰煎意熟地炭麥冬紫石英蘇子制川附炙甘草當歸牛膝苡仁案上旬之年下元必敗脈歇止上有痰喘氣促雖曰舊恙時發理宜標本兼顧旋覆花杏仁法半夏茯苓西黨參五味麥冬肉熟地炭炙甘草紫石英懷牛膝案老年氣喘脈左弦右細下虛不攝挾肝木以橫逆藥難許效旋覆花麥冬北沙參茯苓法半夏五味子炙甘草代赭石加枇杷葉案凌左脈弦數搏指右脈較小舌紅胎黃咳吐濁痰帶血肝火亢逆肺失清肅之令勢非易愈絲瓜子三錢米仁一錢桃仁泥二錢紫菀一錢真川貝三錢石決明四錢桑皮一錢半白薇一錢半蘆根一兩枇杷葉五片案虛邪戀肺咳吐緑痰是系肝經之熱傳肺不可以喘逆為治真青黛蛤殼新會皮茯苓炙甘草北沙參麥冬肉法半夏枳實加竹茹九血症案吐血之脈右數大左關弦數上溢此係操勞太過擾動肝陽以致衝脈為之撼搖極宜靜養為要犀角尖丹皮石決明牛膝旱蓮草細生地白薇湖蓮肉茅根案吐血後脈動數不靜暫以清中焦營分之熱細生地丹皮犀角尖菊花山梔炭小川連赤芍白花茺蔚藕節茅根復診嘔血頻脈數帶弦不靜行動則氣促咳嗆陰虛陽浮春令尤宜防慎細生地牛膝丹皮桑葉女貞子旱蓮草犀角紫石英甘菊白花茺蔚加蘆根案去血過多身熱不退脈芤數無力舌涸中焦此陰傷火迫所致防其痙厥致變細生地元參旱蓮草毛薑女貞子犀角尖丹皮懷牛膝茅根案秋燥上薄吐血脈數冬瓜子紫菀桑葉玉竹白薇丹皮茜草元參心茅根案經絡營衛受傷細生地赤芍全當歸川芎片薑黃川連枳實瓜蔞皮桃仁冬瓜子骨碎補米仁制香附蘇子案先下血繼嘔血面白無華脘腹反見痞滿內中尚有瘀積防成血蠱病起於暴暫擬仲景法醋大黃桃仁全瓜蔞赤芍炒枳實佩蘭䗪蟲七個酒浸炒案癘風胃爛嘔血不治製大黃桃仁鮮生地甘草人中白炙乳沒狗脊白蒺藜續斷另服酒浸䗪蟲案外傷失血微咳醋大黃桃仁炙乳沒赤芍冬瓜子全當歸丹皮炒苡仁加酒浸䗪蟲復診重傷失血之後脈數不靜痰帶微紅緩中補虛咳嗽稍減然究難脫體冬瓜子米仁桃仁泥蘇子全當歸飛滑石紫菀降真香茜草紅棗加十大功勞案陽明胃病上下失血其色黑脈小數擬通絡法炮薑炭赤芍白朮炭炙草荊芥炭旋覆花新絳白薇當歸案絡傷血溢宜清宜和冬桑葉牛膝酒當歸炙草荊芥炭旋覆花新絳白薇白芍女貞子紫菀茸茅根案吐血之後目眩脫力脈弦浮緩大並無氣火有餘之象是系肝陽擾逆藥宜靜攝肝腎同治原生地牛膝元武板旱蓮草女貞子石決明丹皮桑葉黃菊穭豆皮軟白薇加茅根肉案脈數兼大鼻衄此燥火上薄陽絡也山梔炭白薇冬瓜子丹皮生甘草煨石膏麥冬肉冬桑葉加茅針花案身熱少汗咳痰帶血腹痛便泄不爽小溲短赤而痛暑邪蘊遏三焦上衝於肺則咽痛下注腸胃則泄瀉肺失下降之令則膀胱氣化不行故小溲短赤而痛也杏仁三錢連翹二錢木通一錢半赤苓三錢酒芩一錢半廣皮一錢赤芍一錢半龍膽草五分粉丹皮一錢半姜山梔三錢復診身熱汗少咳痰見血兼之腹痛二便不爽兩脈郁數舌胎中黃邊白暑濕之邪蘊遏三焦腑中之氣未能宣暢總由肺失下降之令所致法宜疏其結滯使肺氣下行水道通而諸氣之郁自解矣大杏仁打三錢連翹三錢冬瓜子三錢蔞皮三錢滑石三錢象貝去心三錢姜山梔三錢廣皮鹽水炒一錢赤苓三錢枳殼一錢半薄荷四分豬苓二錢加蘆根去節一兩十咽喉案咽中如有物阻病名梅核氣乃思則氣結七情之症也藥難許效老蘇梗茯苓法半夏厚朴新會皮夏枯草米鉤大貝案咽痛得滋養而減其為陰液不上承可知再宗前意合趙養葵補水生金之旨原生地阿膠雞子清麥冬人中白女貞子旱蓮穭豆皮湖藕鮮百合案疫痧回後喉腐增劇咽飲妨礙唇上亦麋診六脈沉弱兼數是為痧毒結喉症經兩候元氣被傷非小恙也擬用清搜化毒法大青葉玳瑁生牛蒡馬勃連翹心人中白元參人中黃桔梗鮮生地淡竹葉藿梗大貝母案喉癬時發脈細數舌紅咳嗆此陰虛火炎所致症屬糾纏細生地元參人中白丹皮小木通生甘草桔梗加鮮淡竹葉案咳血屢發之後喉痹失音左脈弦大是系肝陽上擾木反侮金之候極宜靜養為要西羚尖元參人中白花粉石決明夏枯草連翹鮮百合案失音已久咽痛舌心光脈細數陰虛喉痹難治馬兜鈴杏仁細生地元參夏枯草人中白桔梗生甘草木通淡竹葉案肺痿失音咽痛脈微無神症難調治北沙參麥冬夏枯草桔梗五味子熟半夏甘草紫菀茸張氏喉方六味湯主治咽喉腫脹不論紅白初起服一服後再加減桔梗生甘草防風荊芥穗殭蠶薄荷十一肺癰案咳嗽寒熱已經四十餘日痰濁腥臭腹如仰瓦脈虛數病在肺癰肺痿之間非易療也北沙參苡仁絲瓜子桃仁旋覆花法半夏桑葉麥冬葦莖合歡皮案肺邪不早清理致令壅遏成癰脈數大形瘦胸中多氣寒熱咳嗽痰血腥臭症勢難調矣冬瓜子苡仁苦桔梗兜鈴牛蒡子生甘草桃仁桑白皮黃芩大貝合歡皮滑石蘆根案心下先痛痛止後即起咳吐痰血已經兩月矣刻診尺脈數大無倫舌光身熱喘不得臥外象似屬肺癰肝腎之火已動症屬難調甜瓜子苡仁桑葉桃仁桑白皮地骨皮紫菀苦桔梗茜草生甘草合歡皮蘆根案久嗽脈數大痰血屢見有肺癰之象症非易愈甜瓜子桃仁桑白皮米仁大貝母杏仁茜草苦桔梗蘆根
